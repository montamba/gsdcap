<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="stylesheet" href="/../static/css/message.css">
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <title>GSD Parking — Login</title>
    <style>
        * { padding: 0; margin: 0; box-sizing: border-box; }

        body {
            background: #eef4ff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Syne', sans-serif;
            overflow: hidden;
            position: relative;
        }

        /* Background pattern */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image:
                linear-gradient(#2563eb08 1px, transparent 1px),
                linear-gradient(90deg, #2563eb08 1px, transparent 1px);
            background-size: 40px 40px;
            pointer-events: none;
        }

        /* Glow blobs */
        .blob1, .blob2 {
            position: fixed;
            border-radius: 50%;
            filter: blur(80px);
            pointer-events: none;
        }
        .blob1 {
            width: 500px; height: 500px;
            background: #bfdbfe;
            top: -150px; left: -150px;
            opacity: 0.5;
            animation: pulse 6s ease-in-out infinite;
        }
        .blob2 {
            width: 400px; height: 400px;
            background: #93c5fd;
            bottom: -100px; right: -100px;
            opacity: 0.4;
            animation: pulse 8s ease-in-out infinite reverse;
        }
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        .maincontainer {
            position: relative;
            width: 420px;
            background: #ffffff;
            border: 1px solid #c7d9f5;
            box-shadow: 0 20px 60px rgba(37,99,235,0.12), 0 4px 16px rgba(0,0,0,0.06);
            overflow: hidden;
            border-radius: 16px;
            /* on very small screens, allow it to fill width */
            max-width: calc(100vw - 24px);
        }

        /* Top accent bar */
        .maincontainer::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 3px;
            background: linear-gradient(90deg, #2563eb, #0ea5e9, #2563eb);
        }

        .logos {
            padding: 32px 40px 24px;
            background: #f5f9ff;
            border-bottom: 1px solid #ddeaff;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
        }

        .logo-icon {
            width: 56px; height: 56px;
            border-radius: 14px;
            background: linear-gradient(135deg, #2563eb, #0ea5e9);
            display: grid;
            place-items: center;
            font-size: 24px;
            color: #ffffff;
            box-shadow: 0 8px 20px rgba(37,99,235,0.3);
            margin-bottom: 4px;
        }

        .logos h3 {
            font-size: 18px;
            font-weight: 800;
            color: #0f172a;
            letter-spacing: 0.02em;
        }

        .logos p {
            font-size: 11px;
            color: #94a3b8;
            font-family: 'Space Mono', monospace;
            letter-spacing: 0.1em;
        }

        .forform {
            padding: 28px 40px 36px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        /* Role selector */
        .role {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 6px;
            background: #f1f5f9;
            padding: 5px;
            border: 1px solid #e2e8f0;
            border-radius: 10px;
        }

        .role button {
            padding: 10px 6px;
            background: transparent;
            border: 1px solid transparent;
            color: #64748b;
            font-family: 'Syne', sans-serif;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 5px;
            letter-spacing: 0.02em;
            border-radius: 7px;
        }

        .role button:hover {
            color: #334155;
            background: rgba(255,255,255,0.7);
        }

        .role button.active {
            background: #ffffff;
            border: 1px solid #c7d9f5;
            color: #2563eb;
            box-shadow: 0 1px 6px rgba(37,99,235,0.1);
        }

        /* Form fields */
        .con {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .con label {
            font-size: 11px;
            font-weight: 700;
            color: #64748b;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            font-family: 'Space Mono', monospace;
        }

        .con input {
            padding: 12px 16px;
            background: #f8faff;
            border: 1.5px solid #c7d9f5;
            color: #0f172a;
            font-family: 'Syne', sans-serif;
            font-size: 14px;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
            border-radius: 8px;
        }

        .con input:focus {
            border-color: #2563eb;
            box-shadow: 0 0 0 3px rgba(37,99,235,0.1);
            background: #ffffff;
        }

        .con input::placeholder { color: #cbd5e1; }

        /* Show password */
        .showpass {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .showpass label {
            font-size: 12px;
            color: #64748b;
            cursor: pointer;
            font-family: 'Space Mono', monospace;
        }

        .showpass input[type=checkbox] {
            width: 14px; height: 14px;
            accent-color: #2563eb;
            cursor: pointer;
        }

        /* Submit button */
        .submit { margin-top: 4px; }

        .submit button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #2563eb, #0ea5e9);
            border: none;
            color: #ffffff;
            font-family: 'Syne', sans-serif;
            font-size: 15px;
            font-weight: 800;
            cursor: pointer;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            transition: all 0.25s;
            position: relative;
            overflow: hidden;
            border-radius: 8px;
            box-shadow: 0 4px 16px rgba(37,99,235,0.3);
        }

        .submit button:hover {
            box-shadow: 0 6px 22px rgba(37,99,235,0.4);
            transform: translateY(-1px);
        }

        .submit button:active { transform: scale(0.99); }
        .submit button:disabled { opacity: 0.7; cursor: not-allowed; }

        .in {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .rotate { animation: rotate 0.8s infinite linear; }

        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        /* Bottom tag */
        .tag {
            text-align: center;
            padding: 12px;
            background: #f5f9ff;
            border-top: 1px solid #ddeaff;
            font-size: 10px;
            color: #94a3b8;
            font-family: 'Space Mono', monospace;
            letter-spacing: 0.1em;
        }

        /* ─── MOBILE ─── */
        @media (max-width: 480px) {
            body { align-items: flex-end; overflow: auto; }

            .blob1 { width: 280px; height: 280px; top: -80px; left: -80px; }
            .blob2 { width: 200px; height: 200px; bottom: -60px; right: -60px; }

            .maincontainer {
                width: 100%;
                max-width: 100%;
                border-radius: 24px 24px 0 0;
                border-left: none;
                border-right: none;
                border-bottom: none;
                box-shadow: 0 -10px 40px rgba(37,99,235,0.15);
                /* slide up animation */
                animation: slideUp 0.35s cubic-bezier(0.34,1.56,0.64,1);
            }

            @keyframes slideUp {
                from { transform: translateY(60px); opacity: 0; }
                to   { transform: translateY(0);    opacity: 1; }
            }

            .logos { padding: 24px 24px 20px; }
            .logos h3 { font-size: 16px; }
            .logo-icon { width: 48px; height: 48px; font-size: 20px; }

            .forform { padding: 20px 24px 28px; gap: 14px; }

            .role button { font-size: 12px; padding: 9px 4px; }
            .role button i { display: none; }  /* hide icons on narrow screens */

            .con input { padding: 11px 14px; font-size: 14px; }
            .submit button { padding: 13px; font-size: 14px; }

            .tag { font-size: 9px; padding: 10px; }
        }

        @media (min-width: 481px) and (max-width: 640px) {
            .maincontainer { width: calc(100vw - 32px); }
            .forform { padding: 24px 28px 30px; }
            .logos { padding: 24px 28px 20px; }
        }
    </style>
</head>
<body>
    <div class="blob1"></div>
    <div class="blob2"></div>

    <div class="maincontainer">
        <div class="logos">
            <div class="logo-icon">
                <i class="bi bi-car-front-fill"></i>
            </div>
            <h3>GSD Parking System</h3>
            <p>VEHICLE MONITORING SYSTEM</p>
        </div>

        <div class="forform">
            <div class="role">
                <button class="admin active" onclick="changeRole('admin')">👑 Admin</button>
                <button class="staff" onclick="changeRole('staff')"><i class="bi bi-people-fill"></i> Staff</button>
                <button class="guard" onclick="changeRole('guard')"><i class="bi bi-shield-fill"></i> Guard</button>
            </div>

            <div class="con">
                <label for="email">Email Address</label>
                <input id="email" type="email" placeholder="Enter your email" required>
            </div>

            <div class="con">
                <label for="password">Password</label>
                <input id="password" type="password" placeholder="Enter your password" required>
            </div>

            <div class="showpass">
                <input id="passhow" onclick="showPassword()" type="checkbox">
                <label for="passhow">Show password</label>
            </div>

            <div class="submit">
                <button onclick="login(this)">
                    <div class="in">
                        <i class="bi bi-box-arrow-in-right"></i>&nbsp;Sign In
                    </div>
                </button>
            </div>
        </div>

        <div class="tag">GSD PARKING MONITORING v1.0 — SECURE ACCESS</div>
    </div>

    <script src="/../static/scripts/scrit.js"></script>
    <script>
        function showPassword(){
            let checkbox = document.getElementById("passhow");
            document.getElementById("password").type = (checkbox.checked) ? "text" : "password";
        }

        let selectedrole = "admin"
        function changeRole(role){
            let buttons = document.querySelectorAll(".role button")
            buttons.forEach((element) => { element.classList.remove("active") })
            selectedrole = role
            let tar = document.querySelector(".role button." + role)
            tar.classList.add("active")
        }

        async function login(element){
            let email = document.getElementById("email").value.trim()
            let password = document.getElementById("password").value

            if(!email){ alert("Enter email"); return }
            if(password.length < 3){ alert("Password too short"); return }

            let data = {
                'email': email,
                'password': password,
                'role': selectedrole
            }

            let inner = element.querySelector(".in")
            inner.innerHTML = `<i class="bi bi-arrow-clockwise"></i>`
            inner.classList.add("rotate")
            element.disabled = true

            let res = await API.login(data);

            inner.innerHTML = `<i class="bi bi-box-arrow-in-right"></i>&nbsp;Sign In`
            inner.classList.remove("rotate")
            element.disabled = false

            if(res.status === "Success"){
                if(selectedrole === "admin"){
                    window.location.href = "/admin/dashboard";
                } else if(selectedrole === "staff"){
                    window.location.href = "/staff/generate";
                } else{
                    window.location.href = "/guard/scan"
                }
            } else {
                showMessageModal(res.message, res.status)
            }
        }
    </script>
</body>
</html>
