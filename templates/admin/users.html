<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="/../../static/css/style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        .header{
            background:linear-gradient(135deg,#4facfe,#00f2fe);
            color:white;
            padding:25px;
        }

        .containers{
            padding: 20px;
            display: flex;
            justify-content: center;
            gap: 20px;
            height: 200px;
        }

        .containers .con{
            position: relative;
            width: 250px;
            display: grid;
            grid-template-rows: 30px auto;
            padding: 20px;
            align-items: center;
            justify-items: center;
            background: skyblue;
            box-shadow: 0 0 10px lightgray;
        }

        .circle{
            padding: 20px;
            border-radius: 50%;
            width: 100px;
            height: 100px;
            position: absolute;
            right: 0;
            bottom: 0;
            display: grid;
            place-items: center;opacity: 50%;
        }

        .bigtext{
            font-size: 30px;
            opacity: 60%;

        }
        .container{
            display: grid;
            padding: 0px 50px;
            

        }
        table{
            background: darkblue;
            border-top: 1px solid white;
            height: 500px;
            margin-bottom: 20px;
        }

        tr{
            display: grid;
            grid-template-columns: 50px 2fr repeat(3, 1fr);
            grid-column-gap: 2px;
        }

        thead tr{
            background: white;
        }

    
        td, th{
            background: white;
            padding: 10px;
            
        }
        th{
            background: darkblue;
            color: white;
        }

        .head{
            display: grid;
            background: darkblue;
            padding: 20px;
        }

        .head h2{
            margin-bottom: 10px;
            color: white;
            padding: 10px;
            border-bottom: 1px solid;
        }

        .head input{
            padding: 10px;
            background: rgb(0, 0, 56);
            font-size: larger;
            color: white;
        }
    </style>
    
</head>
<body>
    <aside>
        <div class="logos">
            <div class="logo">
                <img src="https://www.freeiconspng.com/thumbs/car-icon-png/car-icon-png-25.png" alt="logo">
            </div>
            <h2>GSD PArking monitoring</h2>
        </div>
        <div class="butt">
            <p class="sml">OVERVIEW</p>
            <button onclick="window.location.href='/admin/dashboard'"><i class="bi bi-clipboard-data"></i> Dashboard</button>
            <p class="sml">MANAGEMENT</p>
            <button onclick="window.location.href='/admin/park'"><i class="bi bi-p-circle"></i> Parking</button>
            <button onclick="window.location.href='/admin/users'"><i class="bi bi-people-fill"></i> Manage users</button>
            <p class="sml">ANALYTICS</p>
            <button onclick="window.location.href='/admin/reports'"><i class="bi bi-graph-up-arrow"></i> Report and logs</button>
        </div>
    </aside>

    <div class="right">
        <div class="header">
            <h1>Manage users</h1>
            <p>Staff and guards</p>
        </div>
        <div class="containers">
            <div class="con" >
                <h3>🔒 Guards</h3>
                <p>-</p>
                <div class="circle" style="background-color: yellow;">
                    <p class="bigtext">
                    -
                    </p>

                </div>
                
            </div>

            <div class="con">
                <h3>👥 Staff</h3>
                <p>-</p>
                <div class="circle" style="background-color: green;">
                    <p class="bigtext">
                    -
                    </p>
                </div>

            </div>

            <div class="con">
                <h3>Total</h3>
                <p>-</p>
                <div class="circle" style="background-color: blue;">
                    <p class="bigtext">
                    -
                    </p>
                </div>
            </div>
        </div>

        <div class="container">
            <div class="head">
                <h2><i class="bi bi-people-fill"></i> USERS</h2>

                <input type="search" placeholder='🔍 Search...'>
            </div>
            <table>
                <thead>
                    <tr>
                        <th>id</th>
                        <th>name</th>
                        <th>role</th>
                        <th>created at</th>
                        <th>action</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td>n</td>
                        <td>nlkjd</td>
                        <td>model</td>
                        <td>today</td>
                        <td><button><i class="bi bi-trash"></i></button><button><i class="bi bi-pencil-square"></i></button></td>

                    </tr>
                </tbody>
            </table>

        </div>

        

    </div> <!--right-->


   
    
</body>
</html>
