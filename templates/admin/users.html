<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="/../../static/css/style.css">
    <link rel="stylesheet" href="/../../static/css/message.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <script src="/../../static/scripts/scrit.js"></script>
    <style>
        .header{
            background:linear-gradient(135deg,#4facfe,#00f2fe);
            color:white;
            padding:25px;
        }

        .containers{
            padding: 20px;
            display: flex;
            justify-content: center;
            gap: 20px;
            height: 200px;
        }

        .containers .con{
            position: relative;
            width: 250px;
            display: grid;
            grid-template-rows: 30px auto;
            padding: 20px;
            align-items: center;
            justify-items: center;
            background: skyblue;
            box-shadow: 0 0 10px lightgray;
        }

        .circle{
            padding: 20px;
            border-radius: 50%;
            width: 100px;
            height: 100px;
            position: absolute;
            right: 0;
            bottom: 0;
            display: grid;
            place-items: center;opacity: 50%;
        }

        .bigtext{
            font-size: 30px;
            opacity: 60%;

        }
        .container{
            display: grid;
            padding: 0px 50px;
            

        }
        table{
            background: darkblue;
            border-top: 1px solid white;
            height: 500px;
            margin-bottom: 20px;
        }

        tr{
            display: grid;
            grid-template-columns: 50px 2fr repeat(3, 1fr);
            grid-column-gap: 2px;
        }

        thead tr{
            background: white;
        }

    
        td, th{
            background: white;
            padding: 10px;
            
        }
        th{
            background: darkblue;
            color: white;
        }

        .head{
            display: grid;
            background: darkblue;
            padding: 20px;
        }

        .head h2{
            margin-bottom: 10px;
            color: white;
            padding: 10px;
            border-bottom: 1px solid;
        }

        .head input{
            padding: 10px;
            background: rgb(0, 0, 56);
            font-size: larger;
            color: white;
        }

        .nouser{
            position: absolute;
            text-align:center;
            height: 100px;
            width:inherit;

            display:grid;
            place-items:center;
        }

        .nouser > div{
            width:100px;
            height:100px;
            border-radius: 50%;
            border:2px solid;

        }

        .btnadduser{
            background: lightblue;
            border: 1px solid;
            padding: 10px;
            margin: 5px;
            font-size: larger;
            color: darkblue;
        }

        #useradd{
            position: fixed;
            top: 50%;left: 50%;
            transform: translate(-50%,-50%);
        }

        #useradd > form{
            padding: 20px;
            width: 500px;

        }

         .usecon{
            display: grid;
         }

        .usecon > select{
            margin: 10px;
            padding: 10px;
            font-size: 10px;
        }
        .usecon > label{
            padding: 10px;
            font-size: 20px;
            color: darkblue;
        }

        .usecon input{
            padding: 10px;
            border-radius: 10px;
        }

        .shwpass{
            display: flex;
            gap:10px;
        }

        .userbtn{
            padding:10px;
            display: flex;
            justify-content: space-evenly;

        }

        .userbtn > button{
            padding: 10px;
            border-radius: 10px;
            border: 2px solid;
            width: 100px;
            transition:300ms;
        }

        .userbtn > button:hover{
            scale:1.1;
        }

        .userbtn > button.cancel{
            color: red;
        }
        
        .userbtn > button.clear{
            color: lightblue;
        }
        .userbtn > button.add{
            color: darkblue;
        }
    </style>
    
</head>
<body>
    <aside>
        <div class="logos">
            <div class="logo">
                <img src="https://www.freeiconspng.com/thumbs/car-icon-png/car-icon-png-25.png" alt="logo">
            </div>
            <h2>GSD PArking monitoring</h2>
        </div>
        <div class="butt">
            <p class="sml">OVERVIEW</p>
            <button onclick="window.location.href='/admin/dashboard'"><i class="bi bi-clipboard-data"></i> Dashboard</button>
            <p class="sml">MANAGEMENT</p>
            <button onclick="window.location.href='/admin/park'"><i class="bi bi-p-circle"></i> Parking</button>
            <button onclick="window.location.href='/admin/users'"><i class="bi bi-people-fill"></i> Manage users</button>
            <p class="sml">ANALYTICS</p>
            <button onclick="window.location.href='/admin/reports'"><i class="bi bi-graph-up-arrow"></i> Report and logs</button>
        </div>
    </aside>

    <div class="right">
        <div class="header">
            <h1>Manage users</h1>
            <p>Staff and guards</p>
        </div>
        <div class="containers">
            <div class="con" >
                <h3>🔒 Guards</h3>
                <p>-</p>
                <div class="circle" style="background-color: yellow;">
                    <p class="bigtext">
                    -
                    </p>

                </div>
                
            </div>

            <div class="con">
                <h3>👥 Staff</h3>
                <p>-</p>
                <div class="circle" style="background-color: green;">
                    <p class="bigtext">
                    -
                    </p>
                </div>

            </div>

            <div class="con">
                <h3>Total</h3>
                <p>-</p>
                <div class="circle" style="background-color: blue;">
                    <p class="bigtext">
                    -
                    </p>
                </div>
            </div>
        </div>

        <div class="container">
            <div class="head">
                <h2><i class="bi bi-people-fill"></i> USERS</h2>

                <input type="search" placeholder='🔍 Search...'>
                <button class="btnadduser" onclick="showmodal()">Add user</button>
            </div>
            <table>
                <thead>
                    <tr>
                        <th>id</th>
                        <th>name</th>
                        <th>role</th>
                        <th>created at</th>
                        <th>action</th>
                    </tr>
                </thead>
                <tbody id="users">
                    
                    
                </tbody> 
            </table>
        </div>


        <dialog id="useradd">
            <form onsubmit="adduser(event)">
                <div class="head">
                    <h2><i class="bi bi-people"></i> ADD USER</h2>
                </div>
                <div class="usecon">
                    <label for="username">Username</label>
                    <input type="text" id="username" placeholder="username" required>
                </div>
                <div class="usecon">
                    <label for="email">Email</label>
                    <input id="email" type="email" placeholder="Email" required>
                </div>
                <div class="usecon">
                    <label for="role">Role</label>
                    <select id="role">
                        <option value="guard">Guard</option>
                        <option value="staff">Staff</option>
                    </select>
                </div>
                <div class="usecon">
                    <label for="password">Password</label>
                    <input type="password" id="password" placeholder="password" required>
                </div>
                <div class="shwpass">
                    <label for="chckpass">Show password: </label>
                    <input id="chckpass" onclick=" showpassword()" type="checkbox" id="">
                </div>

                <div class="userbtn">
                    <button type="submit" class="add">Add</button>
                    <button type="reset" class="clear">Clear</button>
                    <button type="button" class="cancel" commandfor="useradd" command="close">Cancel</button>
                    
                </div>



            </form>

        </dialog>
        

        <script>

            async function adduser(e){
                e.preventDefault()
                let user ={
                    username:document.getElementById("username").value,
                    email: document.getElementById("email").value,
                    role: document.getElementById("role").value,
                    password: document.getElementById("password").value
                }

                if(user.password.length < 8){
                    alert("Password must have 8 characters")
                    return
                }

                let res = await API.post("/admin/add_user", user)

                getUsers()
            }

            function showmodal(){
                document.getElementById("useradd").show()
            }

            function showpassword(){
                let ischecked = document.getElementById("chckpass").checked
                document.getElementById("password").type = (ischecked) ? "text": "password";
            }

            async function getUsers(){
                let data = await API.get("/admin/getusers")
                console.log(data)

                let inhtml = ""

                if(data.status == "bad"){
                    document.getElementById("users").innerHTML = `
                    <tr style=" width:100%;">
                        <div class="nouser">
                            <div>?</div>
                            <h2>No user</h2>
                        </div>
                    </tr>
                    `
                    return
                }

                data.data.forEach(users=>{
                    inhtml += `
                    <tr>
                        <td>${users[0]}</td>
                        <td>${users[1]}</td>
                        <td>${users[2]}</td>
                        <td>${users[3]}</td>
                        <td><button onclick="deleteUsers(${users[0]})"><i class="bi bi-trash"></i></button><button><i class="bi bi-pencil-square"></i></button></td>
                    </tr>
                    `
                })

                if( inhtml){
                    document.getElementById("users").innerHTML = inhtml
                }

                
            }

            async function deleteUsers(id){
                if(confirm("Are you sure to delete user?")){
                    let result = API.delete(`/admin/delete_user/${id}`)
                    console.log(result)
                }

            }

            getUsers()
            setInterval(getUsers, 30000)
        </script>

        

    </div> <!--right-->


   
    
</body>
</html>
