<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="/../../static/css/style.css">
    <link rel="stylesheet" href="/../../static/css/message.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <script src="/../../static/scripts/scrit.js"></script>

    <style>
        .header{
            background:linear-gradient(135deg,#4facfe,#00f2fe);
            color:white;
            padding:25px;
        }
        .maincon{
            display: grid;
            grid-template-columns: repeat(2, 50%);
            padding: 20px;
        }

        .maincon > div:first-child{
            display: grid;
            place-items: center;
        }

        .maincon div form{
            width: 80%;
            border: 2px solid;
            padding: 20px;
            display: grid;
            grid-template-rows: 30px auto 20px;
            grid-row-gap: 10px;
            background: #00f2fe;
            
        }

        form h3{
            border-bottom: 3px solid blue;
            background: darkblue;
            color: white;
            padding: 5px;
        }

        form div{
            display: flex;
            flex-direction: column;
        }

        form input{
            padding: 20px;
            border: 1px solid;
        }

        .slots{
            display: grid;
            grid-template-rows: 30% 70%;
            background: #00f2fe;
        }

        .slots h2{
            padding: 20px 10px;
            background: darkblue;
            color: white;
        }

        .slots > div:last-child{
            display: grid;
            grid-template-columns: auto auto auto;
            padding: 20px;
            grid-column-gap: 20px;
        }

        .slots .con{
            background: skyblue;
            padding: 20px;
            display: grid;
            grid-template-rows: 20px auto;
            justify-items: center;
            position: relative;
            align-items: center;

        }

        .bigtext{
            position: absolute;
            right: 0;
            bottom: 0;
            font-size: 50px;
            opacity: 50%;
        }

        .his{
            padding: 20px;
            width: 100%;
            display: grid;
            place-items: center;
            
        }

        .his > h1{
            color: #4facfe;
        }

        .his table{
            background: #4facfe;
            padding: 20px;
            min-height: 300px;
        }

        .his table tr{
            display: grid;
            width:900px;
            grid-template-columns: 50px repeat(3, minmax(100px, 1fr));
        }

        .his table td, table th{
            border: 1px solid;
            padding: 10px;
            background: white;
        }

        .bi{
            color: #00f2fe;
        }


    </style>
</head>
<body>
    <aside>
        <div class="logos">
            <div class="logo">
                <img src="https://www.freeiconspng.com/thumbs/car-icon-png/car-icon-png-25.png" alt="logo">
            </div>
            <h2>GSD PArking monitoring</h2>
        </div>
        <div class="butt">
            <p class="sml">OVERVIEW</p>
            <button onclick="window.location.href='/admin/dashboard'"><i class="bi bi-clipboard-data"></i> Dashboard</button>
            <p class="sml">MANAGEMENT</p>
            <button onclick="window.location.href='/admin/park'"><i class="bi bi-p-circle"></i> Parking</button>
            <button onclick="window.location.href='/admin/users'"><i class="bi bi-people-fill"></i> Manage users</button>
            <p class="sml">ANALYTICS</p>
            <button onclick="window.location.href='/admin/reports'"><i class="bi bi-graph-up-arrow"></i> Report and logs</button>
        </div>
    </aside>
    <div class="right">
            <div class="header">
            <h1>Parking page</h1>
            <p>manage your parking space</p>

        </div>

        <div class="maincon">
            <div>
                <form onsubmit="updateParking(event)">
                    <h3><i class="bi bi-check-circle-fill"></i> Parking Configuration</h3>

                    <div>
                        <label>Parking space</label>
                        <input type="number" id="park" placeholder="Enter a number of pakning space">
                    </div>
                    <button><i class="bi bi-arrow-repeat"></i> Update</button>

                </form>
            </div>
            <div class="slots">
                <div>
                    <h2><i class="bi bi-card-checklist"></i> Slots</h2>

                </div>
                <div>
                    <div class="con">
                        <h4>Available</h4>
                        <p class="available">-</p>
                        <p class="bigtext available">-</p>
                    </div>
                    <div class="con">
                        <h4>Occupied</h4>
                        <p class="occupied">-</p>
                        <p class="bigtext occupied" >-</p>

                    </div>
                    <div class="con">
                        <h4>Occupied</h4>
                        <p class="total">-</p>
                        <p class="bigtext total" >-</p>

                    </div>

                </div>
                    
            </div>

        </div>

        <div class="his">
            <h1>History</h1>

            <table>
                <thead>
                    <tr>
                        <th>id</th>
                        <th>name</th>
                        <th>qr</th>
                        <th>action</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td>1</td>
                        <td>qrpass</td>
                        <td>hsjms</td>
                        <td><button><i class="bi bi-trash"></i></button><button><i class="bi bi-pencil-square"></i></button></td>
                    </tr>
                </tbody>
            </table>



        </div>

    </div> <!--right-->

    <script>
        async function updateParking(e){
            e.preventDefault()
            let ndata = {
                "total":document.getElementById("park").value
            }

            console.log(ndata)
            let response = await API.put("/admin/setparking", ndata)
            let total = document.querySelectorAll(".total");
            showMessageModal(response.message,"Update status: "+response.status)
            total.forEach(tot => {tot.innerText = response.total})

        }


        async function getParkdata(){
            let available = document.querySelectorAll(".available");
            let occupied = document.querySelectorAll(".occupied");
            let total = document.querySelectorAll(".total");

            let response = await API.get("/admin/parking")
            
            let data = response.data

            available.forEach(avail => {avail.innerText = data.available})
            occupied.forEach(occu => {occu.innerText = data.occupied})
            total.forEach(tot => {tot.innerText = data.total})

        }
        getParkdata()
        

        setInterval(getParkdata, 10000)

    </script>


   
    
</body>
</html>
