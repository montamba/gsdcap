<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Parking — GSD Parking</title>
    <link rel="stylesheet" href="/../../static/css/style.css">
    <link rel="stylesheet" href="/../../static/css/message.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <script src="/../../static/scripts/scrit.js"></script>
    <style>
        .page-header {
            background:#ffffff;
            border-bottom:1px solid #c7d9f5; padding:24px 36px; position:relative;
            box-shadow:0 1px 8px rgba(37,99,235,0.06);
        }
        .page-header h1 { font-size:22px; font-weight:800; color:#0f172a; display:flex; align-items:center; gap:10px; }
        .page-header h1 i { color:#2563eb; }
        .page-header p { font-size:11px; color:#94a3b8; font-family:'Space Mono',monospace; margin-top:4px; letter-spacing:.08em; text-transform:uppercase; }

        .inner { padding:28px 36px; }

        .grid-2 { display:grid; grid-template-columns:1fr 1fr; gap:24px; margin-bottom:28px; }

        .card { background:#ffffff; border:1px solid #c7d9f5; overflow:hidden; border-radius:12px; box-shadow:0 1px 6px rgba(37,99,235,0.07); }
        .card-head {
            padding:14px 20px; background:#f5f9ff; border-bottom:1px solid #ddeaff;
            display:flex; align-items:center; gap:10px;
        }
        .card-head::before { content:''; width:3px; height:14px; background:#2563eb; flex-shrink:0; border-radius:2px; }
        .card-head h3 { font-size:12px; font-weight:700; color:#64748b; text-transform:uppercase; letter-spacing:.12em; font-family:'Space Mono',monospace; }
        .card-head i { color:#2563eb; }

        .card-body { padding:24px; display:flex; flex-direction:column; gap:16px; }

        .form-group { display:flex; flex-direction:column; gap:6px; }
        .form-group label { font-size:10px; font-weight:700; color:#94a3b8; letter-spacing:.14em; text-transform:uppercase; font-family:'Space Mono',monospace; }
        .form-group input {
            padding:12px 16px; background:#f8faff; border:1.5px solid #c7d9f5;
            color:#0f172a; font-family:'Space Mono',monospace; font-size:14px;
            outline:none; transition:border-color .2s, box-shadow .2s; border-radius:8px;
        }
        .form-group input:focus { border-color:#2563eb; box-shadow:0 0 0 3px rgba(37,99,235,0.1); background:#ffffff; }
        .form-group input::placeholder { color:#cbd5e1; }

        .btn-update {
            align-self:flex-start; padding:11px 24px;
            background:linear-gradient(135deg,#2563eb,#0ea5e9); border:none;
            color:#ffffff; font-family:'Syne',sans-serif; font-size:13px; font-weight:800;
            cursor:pointer; letter-spacing:.06em; text-transform:uppercase;
            display:flex; align-items:center; gap:7px; transition:all .2s;
            border-radius:8px; box-shadow:0 3px 12px rgba(37,99,235,0.25);
        }
        .btn-update:hover { opacity:.92; box-shadow:0 5px 18px rgba(37,99,235,0.35); }

        /* ── SLOTS ── */
        .slots-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:1px; background:#ddeaff; margin:20px; border-radius:8px; overflow:hidden; }
        .slot { background:#ffffff; padding:26px 16px; text-align:center; position:relative; overflow:hidden; }
        .slot::before { content:''; position:absolute; top:0; left:0; right:0; height:3px; }
        .slot-available::before { background:#10b981; }
        .slot-occupied::before  { background:#ef4444; }
        .slot-total::before     { background:#2563eb; }
        .slot-label { font-size:10px; font-weight:700; color:#94a3b8; letter-spacing:.15em; text-transform:uppercase; font-family:'Space Mono',monospace; margin-bottom:10px; }
        .slot-num { font-size:44px; font-weight:800; font-family:'Space Mono',monospace; line-height:1; }
        .slot-available .slot-num { color:#10b981; }
        .slot-occupied  .slot-num { color:#ef4444; }
        .slot-total     .slot-num { color:#2563eb; }

        /* ── HISTORY TABLE ── */
        .history-box { background:#ffffff; border:1px solid #c7d9f5; overflow:hidden; border-radius:12px; box-shadow:0 1px 6px rgba(37,99,235,0.07); }
        table { width:100%; border-collapse:collapse; }
        th,td { padding:13px 22px; text-align:left; font-size:13px; }
        th { background:#f5f9ff; color:#64748b; font-family:'Space Mono',monospace; font-size:10px; letter-spacing:.12em; text-transform:uppercase; border-bottom:1px solid #ddeaff; }
        td { color:#334155; border-bottom:1px solid #f1f5f9; }
        tr:last-child td { border-bottom:none; }
        tbody tr:hover td { background:#f8faff; }
        .hist-table tr { display:grid; grid-template-columns:60px 1fr 1fr 140px; }
        .btn-sm { padding:5px 10px; border:1px solid #c7d9f5; background:transparent; color:#64748b; cursor:pointer; font-size:13px; transition:all .2s; margin-right:4px; border-radius:6px; }
        .btn-sm:hover { border-color:#93c5fd; color:#2563eb; background:#eff6ff; }
        .btn-sm.danger:hover { border-color:#fca5a5; color:#ef4444; background:#fee2e2; }
    </style>
</head>
<body>
    <aside>
        <div class="logos">
            <div class="logo"><img src="https://www.freeiconspng.com/thumbs/car-icon-png/car-icon-png-25.png" alt="logo"></div>
            <h2>GSD Parking</h2>
        </div>
        <div class="butt">
            <p class="sml">Overview</p>
            <button onclick="window.location.href='/admin/dashboard'"><i class="bi bi-clipboard-data"></i> Dashboard</button>
            <p class="sml">Management</p>
            <button class="active-nav" onclick="window.location.href='/admin/park'"><i class="bi bi-p-circle"></i> Parking</button>
            <button onclick="window.location.href='/admin/users'"><i class="bi bi-people-fill"></i> Manage Users</button>
            <p class="sml">Analytics</p>
            <button onclick="window.location.href='/admin/reports'"><i class="bi bi-graph-up-arrow"></i> Reports & Logs</button>
        </div>
        <div class="sidebar-footer">
            <button class="logout-btn" onclick="window.location.href='/auth/logout'">
                <i class="bi bi-box-arrow-left"></i> Logout
            </button>
        </div>
    </aside>

    <div class="right">
        <div class="page-header">
            <div>
                <h1><i class="bi bi-p-circle-fill"></i> Parking Management</h1>
                <p>Configure and Monitor Parking Space</p>
            </div>
        </div>

        <div class="inner">
            <div class="grid-2">
                <div class="card">
                    <div class="card-head"><i class="bi bi-gear-fill"></i><h3>Parking Configuration</h3></div>
                    <div class="card-body">
                        <div class="form-group">
                            <label>Total Parking Spaces</label>
                            <input type="number" id="park" placeholder="Enter number of spaces">
                        </div>
                        <button class="btn-update" onclick="updateParking(event)">
                            <i class="bi bi-arrow-repeat"></i> Update Slots
                        </button>
                    </div>
                </div>

                <div class="card">
                    <div class="card-head"><i class="bi bi-card-checklist"></i><h3>Slot Status</h3></div>
                    <div class="slots-grid">
                        <div class="slot slot-available">
                            <div class="slot-label">Available</div>
                            <div class="slot-num available">—</div>
                        </div>
                        <div class="slot slot-occupied">
                            <div class="slot-label">Occupied</div>
                            <div class="slot-num occupied">—</div>
                        </div>
                        <div class="slot slot-total">
                            <div class="slot-label">Total</div>
                            <div class="slot-num total">—</div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="history-box">
                <div class="card-head" style="padding:14px 20px; background:#f5f9ff; border-bottom:1px solid #ddeaff; display:flex; align-items:center; gap:10px;">
                    <span style="width:3px;height:14px;background:#2563eb;display:inline-block;flex-shrink:0;border-radius:2px;"></span>
                    <i class="bi bi-clock-history" style="color:#2563eb;"></i>
                    <h3 style="font-size:12px;font-weight:700;color:#64748b;text-transform:uppercase;letter-spacing:.12em;font-family:'Space Mono',monospace;">Parking History</h3>
                </div>
                <table class="hist-table">
                    <thead>
                        <tr><th>ID</th><th>Name</th><th>QR Code</th><th>Actions</th></tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td style="font-family:'Space Mono',monospace;color:#94a3b8;">01</td>
                            <td>qrpass</td>
                            <td style="font-family:'Space Mono',monospace;color:#2563eb;">hsjms</td>
                            <td>
                                <button class="btn-sm danger"><i class="bi bi-trash"></i></button>
                                <button class="btn-sm"><i class="bi bi-pencil-square"></i></button>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        async function updateParking(e){
            e.preventDefault()
            let ndata = { "total": document.getElementById("park").value }
            let response = await API.put("/admin/setparking", ndata)
            document.querySelectorAll(".total").forEach(t => t.innerText = response.total)
            showMessageModal(response.message, "Update: " + response.status)
        }

        async function getParkdata(){
            let response = await API.get("/admin/parking")
            let data = response.data
            document.querySelectorAll(".available").forEach(el => el.innerText = data.available)
            document.querySelectorAll(".occupied").forEach(el => el.innerText = data.occupied)
            document.querySelectorAll(".total").forEach(el => el.innerText = data.total)
        }

        getParkdata()
        setInterval(getParkdata, 10000)
    </script>
</body>
</html>
