<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard — GSD Parking</title>
    <link rel="stylesheet" href="/../../static/css/style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        .page-header {
            background: #ffffff;
            border-bottom: 1px solid #c7d9f5;
            padding: 24px 36px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: 0 1px 8px rgba(37,99,235,0.06);
        }
        .page-header h1 { font-size:22px; font-weight:800; color:#0f172a; display:flex; align-items:center; gap:10px; }
        .page-header h1 i { color:#2563eb; }
        .page-header p { font-size:11px; color:#94a3b8; font-family:'Space Mono',monospace; margin-top:4px; letter-spacing:.08em; text-transform:uppercase; }
        .live-badge {
            font-size:11px; font-family:'Space Mono',monospace; color:#10b981;
            background:#d1fae5; border:1px solid #6ee7b7; padding:6px 14px; letter-spacing:.1em;
            display:flex; align-items:center; gap:6px; border-radius:20px;
        }
        .live-badge::before { content:''; width:7px; height:7px; background:#10b981; border-radius:50%; animation:blink 1.4s ease-in-out infinite; }
        @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.3} }

        .inner { padding:28px 36px; max-width:1300px; }

        /* ── CARDS ── */
        .cards { display:grid; grid-template-columns:repeat(auto-fit,minmax(210px,1fr)); gap:16px; margin-bottom:28px; }
        .card {
            background:#ffffff; border:1px solid #c7d9f5; padding:22px 22px 18px;
            display:flex; justify-content:space-between; align-items:flex-start;
            transition:all .2s; position:relative; overflow:hidden; cursor:default;
            border-radius:12px; box-shadow:0 1px 6px rgba(37,99,235,0.07);
        }
        .card::before { content:''; position:absolute; top:0; left:0; right:0; height:3px; border-radius:12px 12px 0 0; }
        .card:hover { transform:translateY(-3px); box-shadow:0 8px 28px rgba(37,99,235,0.13); border-color:#93c5fd; }
        .card-1::before { background:linear-gradient(90deg,#2563eb,#0ea5e9); }
        .card-2::before { background:linear-gradient(90deg,#10b981,#0ea5e9); }
        .card-3::before { background:linear-gradient(90deg,#ef4444,#f97316); }
        .card-4::before { background:linear-gradient(90deg,#8b5cf6,#2563eb); }
        .card-label { font-size:10px; font-weight:700; color:#94a3b8; text-transform:uppercase; letter-spacing:.15em; font-family:'Space Mono',monospace; margin-bottom:10px; }
        .card-num { font-size:38px; font-weight:800; font-family:'Space Mono',monospace; line-height:1; }
        .card-1 .card-num { color:#2563eb; }
        .card-2 .card-num { color:#10b981; }
        .card-3 .card-num { color:#ef4444; }
        .card-4 .card-num { color:#8b5cf6; }
        .card-icon { width:48px; height:48px; display:flex; align-items:center; justify-content:center; font-size:20px; flex-shrink:0; border-radius:10px; }
        .card-1 .card-icon { background:#dbeafe; color:#2563eb; }
        .card-2 .card-icon { background:#d1fae5; color:#10b981; }
        .card-3 .card-icon { background:#fee2e2; color:#ef4444; }
        .card-4 .card-icon { background:#ede9fe; color:#8b5cf6; }

        /* ── ACTIONS ── */
        .actions { display:flex; gap:10px; margin-bottom:28px; flex-wrap:wrap; }
        .btn { padding:10px 20px; font-family:'Syne',sans-serif; font-size:13px; font-weight:700; cursor:pointer; letter-spacing:.04em; transition:all .2s; display:flex; align-items:center; gap:7px; border-radius:8px; }
        .btn-primary { background:linear-gradient(135deg,#2563eb,#0ea5e9); border:none; color:#ffffff; font-weight:800; }
        .btn-primary:hover { opacity:.9; transform:translateY(-1px); box-shadow:0 4px 16px rgba(37,99,235,0.3); }
        .btn-ghost { background:#ffffff; border:1px solid #c7d9f5; color:#64748b; }
        .btn-ghost:hover { border-color:#93c5fd; color:#2563eb; background:#eff6ff; }

        /* ── SECTION TITLE ── */
        .section-title {
            font-size:12px; font-weight:700; color:#64748b; text-transform:uppercase;
            letter-spacing:.12em; font-family:'Space Mono',monospace;
            padding:16px 22px; border-bottom:1px solid #ddeaff;
            display:flex; align-items:center; gap:10px;
            background:#f5f9ff;
        }
        .section-title::before { content:''; width:3px; height:14px; background:#2563eb; flex-shrink:0; border-radius:2px; }
        .section-title i { color:#2563eb; }

        /* ── CHART BOX ── */
        .chart-box { background:#ffffff; border:1px solid #c7d9f5; margin-bottom:24px; border-radius:12px; overflow:hidden; box-shadow:0 1px 6px rgba(37,99,235,0.07); }
        .chart-inner { padding:24px; }

        /* ── TABLE BOX ── */
        .table-box { background:#ffffff; border:1px solid #c7d9f5; overflow:hidden; border-radius:12px; box-shadow:0 1px 6px rgba(37,99,235,0.07); }
        table { width:100%; border-collapse:collapse; }
        th,td { padding:13px 22px; text-align:left; font-size:13px; }
        th { background:#f5f9ff; color:#64748b; font-family:'Space Mono',monospace; font-size:10px; letter-spacing:.12em; text-transform:uppercase; border-bottom:1px solid #ddeaff; }
        td { color:#334155; border-bottom:1px solid #f1f5f9; }
        tr:last-child td { border-bottom:none; }
        tbody tr:hover td { background:#f8faff; color:#0f172a; }
        .plate { font-family:'Space Mono',monospace; color:#1e3a8a; font-size:13px; }
        .badge { display:inline-flex; align-items:center; gap:5px; padding:3px 10px; font-size:10px; font-weight:700; font-family:'Space Mono',monospace; letter-spacing:.06em; border-radius:20px; }
        .badge-in { background:#d1fae5; color:#065f46; border:1px solid #6ee7b7; }
        .badge-out   { background:#fee2e2; color:#991b1b; border:1px solid #fca5a5; }
    </style>
</head>
<body>
    <aside>
        <div class="logos">
            <div class="logo"><img src="https://www.freeiconspng.com/thumbs/car-icon-png/car-icon-png-25.png" alt="logo"></div>
            <h2>GSD Parking</h2>
        </div>
        <div class="butt">
            <p class="sml">Overview</p>
            <button class="active-nav" onclick="window.location.href='/admin/dashboard'"><i class="bi bi-clipboard-data"></i> Dashboard</button>
            <p class="sml">Management</p>
            <button onclick="window.location.href='/admin/park'"><i class="bi bi-p-circle"></i> Parking</button>
            <button onclick="window.location.href='/admin/users'"><i class="bi bi-people-fill"></i> Manage Users</button>
            <p class="sml">Analytics</p>
            <button onclick="window.location.href='/admin/reports'"><i class="bi bi-graph-up-arrow"></i> Reports & Logs</button>
        </div>
        <div class="sidebar-footer">
            <button class="logout-btn" onclick="window.location.href='/auth/logout'">
                <i class="bi bi-box-arrow-left"></i> Logout
            </button>
        </div>
    </aside>

    <div class="right">
        <div class="page-header">
            <div>
                <h1><i class="bi bi-clipboard-data"></i> Dashboard</h1>
                <p>Parking System — Command Center</p>
            </div>
            <div class="live-badge">Live</div>
        </div>

        <div class="inner">
            <div class="cards">
                <div class="card card-1">
                    <div><div class="card-label">Parking Slots</div><div class="card-num" id="totalSlots">—</div></div>
                    <div class="card-icon"><i class="bi bi-p-circle-fill"></i></div>
                </div>
                <div class="card card-2">
                    <div><div class="card-label">Entered Today</div><div class="card-num" id="enteredToday">—</div></div>
                    <div class="card-icon"><i class="bi bi-arrow-bar-right"></i></div>
                </div>
                <div class="card card-3">
                    <div><div class="card-label">Occupied</div><div class="card-num" id="occupied">—</div></div>
                    <div class="card-icon"><i class="bi bi-car-front-fill"></i></div>
                </div>
                <div class="card card-4">
                    <div><div class="card-label">Active QR</div><div class="card-num" id="activeQr">—</div></div>
                    <div class="card-icon"><i class="bi bi-qr-code"></i></div>
                </div>
            </div>

            <div class="actions">
                <button class="btn btn-primary"><i class="bi bi-plus-lg"></i> Add Parking Slot</button>
                <button class="btn btn-ghost"><i class="bi bi-qr-code-scan"></i> Generate QR</button>
                <button class="btn btn-ghost" onclick="window.location.href='/admin/reports'"><i class="bi bi-graph-up-arrow"></i> View Reports</button>
            </div>

            <div class="chart-box">
                <div class="section-title"><i class="bi bi-bar-chart-line"></i> Weekly Parking Activity</div>
                <div class="chart-inner">
                    <canvas id="parkingChart" height="80"></canvas>
                </div>
            </div>

            <div class="table-box">
                <div class="section-title"><i class="bi bi-clock-history"></i> Recent Parking Activity</div>
                <table>
                    <thead>
                        <tr>
                            <th>QR Code</th>
                            <th>Time</th>
                            <th>Action</th>
                            <th>Plate Number</th>
                            <th>Status</th>
                        </tr>
                    </thead>
                    <tbody id="activityTable">
                        <tr>
                            <td colspan="5" style="text-align:center;color:#94a3b8;">Loading...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script src="/../../static/scripts/scrit.js"></script>
    <script>
        let chartInstance = null;

        async function loadDashboardData() {
            try {
                let statsRes = await API.get("/admin/dashboard_data");
                if(statsRes.status === "good") {
                    document.getElementById("totalSlots").textContent = statsRes.parking_slots;
                    document.getElementById("enteredToday").textContent = statsRes.entered_today;
                    document.getElementById("occupied").textContent = statsRes.occupied;
                    document.getElementById("activeQr").textContent = statsRes.active_qr;
                }

                let chartRes = await API.get("/admin/activity_chart");
                if(chartRes.status === "good") {
                    updateChart(chartRes.labels, chartRes.data);
                }

                let activityRes = await API.get("/admin/recent_activity");
                if(activityRes.status === "good") {
                    updateActivityTable(activityRes.data);
                }
            } catch(e) {
                console.error("Error loading dashboard:", e);
            }
        }

        function updateChart(labels, data) {
            const ctx = document.getElementById('parkingChart').getContext('2d');
            
            if(chartInstance) {
                chartInstance.destroy();
            }

            chartInstance = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels.length > 0 ? labels : ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'],
                    datasets: [{
                        label: 'Cars Entered',
                        data: data.length > 0 ? data : [0,0,0,0,0,0,0],
                        borderColor: '#2563eb',
                        backgroundColor: 'rgba(37,99,235,0.07)',
                        tension: 0.4, fill: true,
                        pointBackgroundColor: '#2563eb',
                        pointBorderColor: '#ffffff',
                        pointBorderWidth: 2, pointRadius: 5
                    }]
                },
                options: {
                    responsive: true,
                    plugins: { legend: { labels: { color:'#64748b', font:{ family:'Space Mono', size:11 } } } },
                    scales: {
                        x: { ticks:{ color:'#94a3b8', font:{ family:'Space Mono', size:11 } }, grid:{ color:'#f1f5f9' } },
                        y: { ticks:{ color:'#94a3b8', font:{ family:'Space Mono', size:11 } }, grid:{ color:'#f1f5f9' } }
                    }
                }
            });
        }

        function updateActivityTable(activities) {
            const tbody = document.getElementById("activityTable");
            
            if(!activities || activities.length === 0) {
                tbody.innerHTML = `<tr><td colspan="5" style="text-align:center;color:#94a3b8;">No recent activity</td></tr>`;
                return;
            }

            let html = activities.map(activity => {
                const actionBadge = activity.action === 'entry' 
                    ? `<span class="badge badge-in">● ENTRY</span>`
                    : `<span class="badge badge-out">● EXIT</span>`;
                
                return `
                    <tr>
                        <td style="font-family:'Space Mono',monospace;font-size:11px;color:#2563eb;">${activity.qr_code || '—'}</td>
                        <td style="font-size:11px;color:#94a3b8;">${activity.time || '—'}</td>
                        <td>${actionBadge}</td>
                        <td class="plate">${activity.plate || '—'}</td>
                        <td style="color:#10b981;font-weight:600;">${activity.status === 'accepted' ? '✓ Accepted' : '✗ Rejected'}</td>
                    </tr>
                `;
            }).join("");

            tbody.innerHTML = html;
        }

        loadDashboardData();

        setInterval(loadDashboardData, 30000);
    </script>
</body>
</html>
