<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reports — GSD Parking</title>
    <link rel="stylesheet" href="/../../static/css/style.css">
    <link rel="stylesheet" href="/../../static/css/message.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <script src="/../../static/scripts/scrit.js"></script>
    <style>
        .page-header {
            background:#ffffff;
            border-bottom:1px solid #c7d9f5; padding:24px 36px;
            box-shadow:0 1px 8px rgba(37,99,235,0.06);
        }
        .page-header h1 { font-size:22px; font-weight:800; color:#0f172a; display:flex; align-items:center; gap:10px; }
        .page-header h1 i { color:#2563eb; }
        .page-header p { font-size:11px; color:#94a3b8; font-family:'Space Mono',monospace; margin-top:4px; letter-spacing:.08em; text-transform:uppercase; }

        .inner { padding:28px 36px; }

        .stat-strip { display:grid; grid-template-columns:repeat(3,1fr); gap:16px; margin-bottom:28px; }
        .stat { background:#ffffff; border:1px solid #c7d9f5; padding:24px; position:relative; overflow:hidden; display:flex; justify-content:space-between; align-items:center; border-radius:12px; box-shadow:0 1px 6px rgba(37,99,235,0.07); }
        .stat::before { content:''; position:absolute; top:0; left:0; right:0; height:3px; border-radius:12px 12px 0 0; }
        .stat:nth-child(1)::before { background:#2563eb; }
        .stat:nth-child(2)::before { background:#f59e0b; }
        .stat:nth-child(3)::before { background:#10b981; }
        .stat-label { font-size:10px; font-weight:700; color:#94a3b8; text-transform:uppercase; letter-spacing:.15em; font-family:'Space Mono',monospace; margin-bottom:8px; }
        .stat-num { font-size:40px; font-weight:800; font-family:'Space Mono',monospace; line-height:1; }
        .stat:nth-child(1) .stat-num { color:#2563eb; }
        .stat:nth-child(2) .stat-num { color:#f59e0b; }
        .stat:nth-child(3) .stat-num { color:#10b981; }
        .stat-icon { width:50px; height:50px; display:flex; align-items:center; justify-content:center; font-size:22px; border-radius:10px; }
        .stat:nth-child(1) .stat-icon { background:#dbeafe; color:#2563eb; }
        .stat:nth-child(2) .stat-icon { background:#fef3c7; color:#f59e0b; }
        .stat:nth-child(3) .stat-icon { background:#d1fae5; color:#10b981; }

        .section { background:#ffffff; border:1px solid #c7d9f5; margin-bottom:24px; overflow:hidden; border-radius:12px; box-shadow:0 1px 6px rgba(37,99,235,0.07); }
        .section-head {
            padding:14px 22px; background:#f5f9ff; border-bottom:1px solid #ddeaff;
            display:flex; align-items:center; justify-content:space-between;
        }
        .section-head-left { display:flex; align-items:center; gap:10px; }
        .section-head-left::before { content:''; width:3px; height:14px; background:#2563eb; flex-shrink:0; border-radius:2px; }
        .section-head h2 { font-size:12px; font-weight:700; color:#64748b; text-transform:uppercase; letter-spacing:.12em; font-family:'Space Mono',monospace; }
        .section-head i { color:#2563eb; }

        .legend { display:flex; gap:14px; }
        .leg { font-size:10px; font-weight:700; font-family:'Space Mono',monospace; letter-spacing:.08em; display:flex; align-items:center; gap:5px; }
        .leg::before { content:'●'; font-size:9px; }
        .leg-fail { color:#ef4444; } .leg-fail::before { color:#ef4444; }
        .leg-exp  { color:#f59e0b; } .leg-exp::before  { color:#f59e0b; }
        .leg-ok   { color:#10b981; } .leg-ok::before   { color:#10b981; }

        table { width:100%; border-collapse:collapse; }
        th,td { padding:13px 22px; text-align:left; font-size:12px; }
        th { background:#f5f9ff; color:#64748b; font-family:'Space Mono',monospace; font-size:10px; letter-spacing:.12em; text-transform:uppercase; border-bottom:1px solid #ddeaff; }
        td { color:#334155; border-bottom:1px solid #f1f5f9; }
        tr:last-child td { border-bottom:none; }
        tbody tr:hover td { background:#f8faff; }
        .rep-table tr { display:grid; grid-template-columns:50px 130px 1fr 110px 100px 100px 120px; }
        .qr-table  tr { display:grid; grid-template-columns:50px 1fr 150px 110px; }

        .badge { display:inline-flex; align-items:center; gap:4px; padding:3px 9px; font-size:10px; font-weight:700; font-family:'Space Mono',monospace; letter-spacing:.06em; border-radius:20px; }
        .badge-ok  { background:#d1fae5; color:#065f46; border:1px solid #6ee7b7; }
        .badge-fail{ background:#fee2e2; color:#991b1b; border:1px solid #fca5a5; }
        .badge-exp { background:#fef3c7; color:#92400e; border:1px solid #fde68a; }

        .empty-row td { color:#94a3b8; font-family:'Space Mono',monospace; font-size:11px; letter-spacing:.08em; }
    </style>
</head>
<body>
    <aside>
        <div class="logos">
            <div class="logo"><img src="https://www.freeiconspng.com/thumbs/car-icon-png/car-icon-png-25.png" alt="logo"></div>
            <h2>GSD Parking</h2>
        </div>
        <div class="butt">
            <p class="sml">Overview</p>
            <button onclick="window.location.href='/admin/dashboard'"><i class="bi bi-clipboard-data"></i> Dashboard</button>
            <p class="sml">Management</p>
            <button onclick="window.location.href='/admin/park'"><i class="bi bi-p-circle"></i> Parking</button>
            <button onclick="window.location.href='/admin/users'"><i class="bi bi-people-fill"></i> Manage Users</button>
            <p class="sml">Analytics</p>
            <button class="active-nav" onclick="window.location.href='/admin/reports'"><i class="bi bi-graph-up-arrow"></i> Reports & Logs</button>
        </div>
        <div class="sidebar-footer">
            <button class="logout-btn" onclick="window.location.href='/auth/logout'">
                <i class="bi bi-box-arrow-left"></i> Logout
            </button>
        </div>
    </aside>

    <div class="right">
        <div class="page-header">
            <div>
                <h1><i class="bi bi-file-earmark-bar-graph-fill"></i> Reports & Logs</h1>
                <p>Analytics — Scan History and QR Activity</p>
            </div>
        </div>

        <div class="inner">
            <div class="stat-strip">
                <div class="stat">
                    <div><div class="stat-label">Today Entries</div><div class="stat-num">0</div></div>
                    <div class="stat-icon"><i class="bi bi-arrow-bar-down"></i></div>
                </div>
                <div class="stat">
                    <div><div class="stat-label">Today Exits</div><div class="stat-num">0</div></div>
                    <div class="stat-icon"><i class="bi bi-arrow-bar-up"></i></div>
                </div>
                <div class="stat">
                    <div><div class="stat-label">QR Scanned</div><div class="stat-num">0</div></div>
                    <div class="stat-icon"><i class="bi bi-qr-code-scan"></i></div>
                </div>
            </div>

            <div class="section">
                <div class="section-head">
                    <div class="section-head-left">
                        <i class="bi bi-newspaper"></i>
                        <h2>Report Logs</h2>
                    </div>
                    <div class="legend">
                        <span class="leg leg-fail">Failed</span>
                        <span class="leg leg-exp">Expired</span>
                        <span class="leg leg-ok">Success</span>
                    </div>
                </div>
                <table class="rep-table">
                    <thead>
                        <tr><th>#</th><th>Date</th><th>Guard</th><th>Plate</th><th>QR Code</th><th>Action</th><th>Scan Result</th></tr>
                    </thead>
                    <tbody>
                        <tr class="empty-row">
                            <td>—</td><td colspan="6" style="color:#94a3b8;">No records yet</td>
                        </tr>
                    </tbody>
                </table>
            </div>

            <div class="section">
                <div class="section-head">
                    <div class="section-head-left">
                        <i class="bi bi-qr-code-scan"></i>
                        <h2>Recently Created QR</h2>
                    </div>
                </div>
                <table class="qr-table">
                    <thead>
                        <tr><th>#</th><th>Data</th><th>Created At</th><th>By</th></tr>
                    </thead>
                    <tbody>
                        <tr class="empty-row">
                            <td>—</td><td>No records yet</td><td>—</td><td>—</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        async function getRecentQR(){
            let data = await API.get("/admin/get_qr")
            let tbody = document.querySelector(".qr-table > tbody")
            let html = ""
            if(data.status == "good"){
                data.data.forEach((users,index)=>{
                    html += `<tr class="empty-row"><td>${index}</td><td>${users[0]}</td><td>${users[1]}</td><td>${users[2]}</td></tr>`
                })
            } else {
                html = `<tr class="empty-row"><td>-</td><td>no data</td><td>-</td><td>-</td></tr>`
            }
            tbody.innerHTML = html
        }
        getRecentQR()
    </script>
</body>
</html>
