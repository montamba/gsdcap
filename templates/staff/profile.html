<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Profile – Staff</title>
  <link rel="stylesheet" href="/../../static/css/staff.css">
  <link rel="stylesheet" href="/../../static/css/message.css">
  <script src="/../../static/scripts/scrit.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=Playfair+Display:wght@600&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'DM Sans', sans-serif; background: #eef4ff; display: flex; min-height: 100vh; }

    .right { flex: 1; padding: 48px 40px; display: flex; align-items: flex-start; justify-content: center; }

    .profile-card { background: #fff; border-radius: 20px; width: 100%; max-width: 520px; overflow: hidden; box-shadow: 0 4px 32px rgba(37,99,235,0.1); border: 1px solid #c7d9f5; }

    .card-banner {
      height: 130px;
      background: linear-gradient(135deg, #2563eb 0%, #0ea5e9 100%);
      position: relative;
    }
    .card-banner::after {
      content: '';
      position: absolute;
      inset: 0;
      background: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23ffffff' fill-opacity='0.08'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
    }

    .avatar-wrap { position: absolute; bottom: -38px; left: 36px; z-index: 2; cursor: pointer; }
    .avatar {
      width: 76px; height: 76px; border-radius: 50%; border: 4px solid #fff;
      background: #dbeafe; display: flex; align-items: center; justify-content: center;
      font-size: 1.9rem; box-shadow: 0 4px 16px rgba(37,99,235,0.2); overflow: hidden; position: relative;
    }
    .avatar-overlay {
      position: absolute; inset: 0; background: rgba(37,99,235,.5);
      display: flex; align-items: center; justify-content: center;
      opacity: 0; transition: opacity .2s; font-size: .68rem; color: #fff;
      font-weight: 700; border-radius: 50%; letter-spacing: .5px; text-align: center; line-height: 1.3;
    }
    .avatar-wrap:hover .avatar-overlay { opacity: 1; }

    .role-badge {
      position: absolute; top: 14px; right: 20px; z-index: 3;
      background: rgba(255,255,255,.2); backdrop-filter: blur(8px);
      color: #fff; font-size: .72rem; font-weight: 600; letter-spacing: 1.2px;
      text-transform: uppercase; padding: 5px 14px; border-radius: 20px;
      border: 1px solid rgba(255,255,255,.35);
    }

    .btn-edit-banner {
      position: absolute; bottom: 12px; right: 16px; z-index: 3;
      background: rgba(255,255,255,.18); backdrop-filter: blur(8px);
      border: 1px solid rgba(255,255,255,.4); color: #fff;
      font-family: 'DM Sans', sans-serif; font-size: .76rem; font-weight: 600;
      padding: 6px 14px; border-radius: 20px; cursor: pointer;
      display: flex; align-items: center; gap: 6px; transition: background .2s;
    }
    .btn-edit-banner:hover { background: rgba(255,255,255,.32); }

    .card-body { padding: 56px 36px 36px; }
    .user-name { font-family: 'Playfair Display', serif; font-size: 1.5rem; color: #0f172a; margin-bottom: 3px; }
    .user-dept { font-size: .8rem; color: #64748b; margin-bottom: 28px; }

    .info-grid { display: grid; gap: 12px; margin-bottom: 28px; }
    .info-item {
      background: #f5f9ff; border: 1px solid #ddeaff; border-radius: 12px;
      padding: 14px 18px; display: flex; align-items: center; gap: 14px;
    }
    .info-icon { width: 36px; height: 36px; border-radius: 8px; background: #dbeafe; display: flex; align-items: center; justify-content: center; font-size: 1rem; flex-shrink: 0; }
    .info-label { font-size: .7rem; color: #94a3b8; text-transform: uppercase; letter-spacing: .8px; margin-bottom: 2px; }
    .info-value { font-size: .92rem; font-weight: 500; color: #1e293b; }

    .divider { height: 1px; background: #ddeaff; margin-bottom: 20px; }

    .btn-row { display: flex; gap: 10px; }
    .btn-reset {
      flex: 1; display: inline-flex; align-items: center; gap: 8px;
      background: linear-gradient(135deg, #2563eb, #0ea5e9); color: #fff; border: none; border-radius: 12px;
      padding: 13px 20px; font-family: 'DM Sans', sans-serif; font-size: .85rem;
      font-weight: 600; cursor: pointer; transition: all .2s; justify-content: center;
      box-shadow: 0 3px 10px rgba(37,99,235,0.25);
    }
    .btn-reset:hover { opacity: .92; transform: translateY(-1px); box-shadow: 0 5px 16px rgba(37,99,235,0.35); }

    /* ── MODALS ── */
    .modal-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(15,23,42,.3); backdrop-filter: blur(4px);
      z-index: 100; align-items: center; justify-content: center;
    }
    .modal-overlay.show { display: flex; }
    .modal {
      background: #fff; border-radius: 20px; padding: 36px;
      width: 100%; max-width: 430px; border: 1px solid #c7d9f5;
      box-shadow: 0 20px 60px rgba(37,99,235,0.15);
      animation: popIn .25s cubic-bezier(.34,1.56,.64,1);
    }
    @keyframes popIn { from { transform: scale(.92); opacity: 0; } to { transform: scale(1); opacity: 1; } }

    .modal-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 6px; }
    .modal h3 { font-family: 'Playfair Display', serif; font-size: 1.2rem; color: #0f172a; }
    .btn-close { background: none; border: none; font-size: 1.2rem; cursor: pointer; color: #94a3b8; line-height: 1; }
    .btn-close:hover { color: #64748b; }
    .modal-sub { font-size: .8rem; color: #64748b; margin-bottom: 22px; }

    .field { margin-bottom: 15px; }
    .field label { display: block; font-size: .72rem; color: #64748b; text-transform: uppercase; letter-spacing: .8px; margin-bottom: 6px; }
    .field input {
      width: 100%; padding: 11px 14px; border: 1.5px solid #c7d9f5;
      border-radius: 10px; font-family: 'DM Sans', sans-serif; font-size: .875rem;
      color: #1e293b; outline: none; transition: border-color .2s, box-shadow .2s; background: #f8faff;
    }
    .field input:focus { border-color: #2563eb; box-shadow: 0 0 0 3px rgba(37,99,235,.1); background: #ffffff; }

    .modal-actions { display: flex; gap: 10px; margin-top: 22px; }
    .btn-cancel {
      flex: 1; padding: 11px; border: 1.5px solid #c7d9f5; border-radius: 10px;
      background: #fff; font-family: 'DM Sans', sans-serif; font-size: .875rem;
      color: #64748b; cursor: pointer; transition: background .2s;
    }
    .btn-cancel:hover { background: #f5f9ff; }
    .btn-save {
      flex: 1; padding: 11px; border: none; border-radius: 10px;
      background: linear-gradient(135deg, #2563eb, #0ea5e9); color: #fff;
      font-family: 'DM Sans', sans-serif; font-size: .875rem; font-weight: 600;
      cursor: pointer; transition: opacity .2s;
    }
    .btn-save:hover { opacity: .92; }

    .avatar-picker-grid { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 8px; }
    .av-opt {
      width: 52px; height: 52px; border-radius: 50%; border: 2.5px solid #c7d9f5;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.5rem; cursor: pointer; transition: border-color .2s, transform .15s; background: #f5f9ff;
    }
    .av-opt:hover { border-color: #93c5fd; transform: scale(1.08); }
    .av-opt.sel { border-color: #2563eb; background: #dbeafe; box-shadow: 0 0 0 3px rgba(37,99,235,.15); }

    .toast {
      position: fixed; bottom: 28px; left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: #1e293b; color: #fff; padding: 12px 22px;
      border-radius: 12px; font-size: .85rem;
      transition: transform .35s cubic-bezier(.34,1.56,.64,1);
      z-index: 300; white-space: nowrap;
    }
    .toast.show { transform: translateX(-50%) translateY(0); }
  </style>
</head>
<body>
    <aside>
        <div class="logos">
            <div class="circle">P</div>
            <span>STAFF PORTAL</span>
        </div>
        <div class="buttons">
            <a href="/staff/generate"><i class="bi bi-qr-code"></i> Generator</a>
            <a href="/staff/history"><i class="bi bi-stopwatch"></i> History</a>
            <a href="/staff/search"><i class="bi bi-search"></i> Search</a>
            <a href="/staff/profile" class="active"><i class="bi bi-people"></i> Profile</a>
        </div>
        <div class="logout">
            <button onclick="window.location.href='/auth/logout'"><i class="bi bi-box-arrow-left"></i> Logout</button>
        </div>
    </aside>

  <div class="right">
    <div class="profile-card">
      <div class="card-banner">
        <span class="role-badge">Staff</span>
        <div class="avatar-wrap" onclick="openAvatar()">
          <div class="avatar">
            <span id="avatarDisplay">🧑‍💼</span>
            <div class="avatar-overlay">📷 Change</div>
          </div>
        </div>
        <button class="btn-edit-banner" onclick="openEdit()">✏️ Edit Profile</button>
      </div>

      <div class="card-body">
        <div class="info-grid">
          <div class="info-item">
            <div class="info-icon">👤</div>
            <div>
              <div class="info-label">Username</div>
              <div class="info-value" id="dUser">—</div>
            </div>
          </div>
          <div class="info-item">
            <div class="info-icon">✉️</div>
            <div>
              <div class="info-label">Email</div>
              <div class="info-value" id="dEmail">—</div>
            </div>
          </div>
          <div class="info-item">
            <div class="info-icon">🏷️</div>
            <div>
              <div class="info-label">Role</div>
              <div class="info-value" id="role">—</div>
            </div>
          </div>
        </div>

        <div class="divider"></div>
        <div class="btn-row">
          <button class="btn-reset" onclick="document.getElementById('pwModal').classList.add('show')">🔒 Reset Password</button>
        </div>
      </div>
    </div>
  </div>

  <div class="modal-overlay" id="editModal">
    <div class="modal">
      <div class="modal-header">
        <h3>Edit Profile</h3>
        <button class="btn-close" onclick="closeEdit()">✕</button>
      </div>
      <p class="modal-sub">Update your personal information below.</p>
      <div class="field"><label>Username</label><input type="text" id="eUser"/></div>
      <div class="field"><label>Email</label><input type="email" id="eEmail"/></div>
      <div class="modal-actions">
        <button class="btn-cancel" onclick="closeEdit()">Cancel</button>
        <button class="btn-save" onclick="saveProfile()">Save Changes</button>
      </div>
    </div>
  </div>

  <div class="modal-overlay" id="avatarModal">
    <div class="modal" style="max-width:360px">
      <div class="modal-header">
        <h3>Change Avatar</h3>
        <button class="btn-close" onclick="document.getElementById('avatarModal').classList.remove('show')">✕</button>
      </div>
      <p class="modal-sub">Pick your avatar icon.</p>
      <div class="avatar-picker-grid" id="avatarGrid">
        <div class="av-opt sel" onclick="pickAv(this,'🧑‍💼')">🧑‍💼</div>
        <div class="av-opt" onclick="pickAv(this,'👩‍💼')">👩‍💼</div>
        <div class="av-opt" onclick="pickAv(this,'🧑‍💻')">🧑‍💻</div>
        <div class="av-opt" onclick="pickAv(this,'👩‍💻')">👩‍💻</div>
        <div class="av-opt" onclick="pickAv(this,'🧑‍🔬')">🧑‍🔬</div>
        <div class="av-opt" onclick="pickAv(this,'🧑‍🎨')">🧑‍🎨</div>
        <div class="av-opt" onclick="pickAv(this,'🦸')">🦸</div>
        <div class="av-opt" onclick="pickAv(this,'😎')">😎</div>
        <div class="av-opt" onclick="pickAv(this,'🧑')">🧑</div>
        <div class="av-opt" onclick="pickAv(this,'👩')">👩</div>
      </div>
      <div class="modal-actions">
        <button class="btn-cancel" onclick="document.getElementById('avatarModal').classList.remove('show')">Cancel</button>
        <button class="btn-save" onclick="applyAvatar()">Apply</button>
      </div>
    </div>
  </div>

  <div class="modal-overlay" id="pwModal">
    <div class="modal">
      <div class="modal-header">
        <h3>Reset Password</h3>
        <button class="btn-close" onclick="document.getElementById('pwModal').classList.remove('show')">✕</button>
      </div>
      <p class="modal-sub">Enter your current password and choose a new one.</p>
      <div class="field"><label>Current Password</label><input type="password" placeholder="••••••••"/></div>
      <div class="field"><label>New Password</label><input type="password" placeholder="••••••••"/></div>
      <div class="field"><label>Confirm New Password</label><input type="password" placeholder="••••••••"/></div>
      <div class="modal-actions">
        <button class="btn-cancel" onclick="document.getElementById('pwModal').classList.remove('show')">Cancel</button>
        <button class="btn-save" onclick="savePw()">Save Changes</button>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    let pendingAv = null;
    function openEdit() {
      document.getElementById('editModal').classList.add('show');
      document.getElementById('eUser').value = document.getElementById('dUser').innerText
      document.getElementById('eEmail').value = document.getElementById('dEmail').innerText
    }
    function closeEdit() { document.getElementById('editModal').classList.remove('show'); }
    function openAvatar() { document.getElementById('avatarModal').classList.add('show'); }

    async function getUserData(){
      let user = await API.get("/staff/getuserdata");
      let dat = user.data
      document.getElementById('dUser').innerText = dat[0]
      document.getElementById('dEmail').innerText = dat[1]
      document.getElementById('role').innerText = dat[2]
    }

    function pickAv(el, emoji) {
      document.querySelectorAll('.av-opt').forEach(o => o.classList.remove('sel'));
      el.classList.add('sel');
      pendingAv = emoji;
    }
    function applyAvatar() {
      if (pendingAv) document.getElementById('avatarDisplay').textContent = pendingAv;
      document.getElementById('avatarModal').classList.remove('show');
      toast('🖼️ Avatar updated!');
    }
    async function saveProfile() {
      let user = {
        username: document.getElementById('eUser').value.trim(),
        email: document.getElementById('eEmail').value.trim()
      }
      let res = await API.put("/staff/updateuser", user)
      showMessageModal(res.message, res.status)
      getUserData()
      closeEdit();
      toast('✅ Profile updated successfully!');
    }
    function savePw() {
      document.getElementById('pwModal').classList.remove('show');
      toast('🔒 Password updated successfully!');
    }
    function toast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 3000);
    }
    getUserData()
  </script>
</body>
</html>
