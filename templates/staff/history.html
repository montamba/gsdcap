<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/../../static/css/staff.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <title>Generator</title>

    <style>
        .header{
            background: linear-gradient(136deg, lightblue, blue);
            padding: 10px;
        }

        .containers{
            display: flex;
            gap: 10px;
            padding: 20px;
            justify-content: center;
        }

        .containers .con{
            border: 2px solid;
            border-left: 10px solid;
            box-shadow: 0 0 10px grey;
            padding: 20px;
            border-radius: 10px;
            background-color: grey;
        }

        .recently{
            background-color: azure;
            padding: 20px;
            display: grid;
            place-items: center;
        }

        .recently>div{
            width: 100%;
            border: 2px solid;
            padding: 10px;
            background-color: darkblue;
            color: white;
        }

        .recently table{
            width: 900px;
            background: darkblue;
            height: 300px;
        }

        .recently tr{
            width: 100%;
            display: grid;
            grid-template-columns: 50px 1fr 150px repeat(3, 100px);
            grid-column-gap: 2px;
        }

        .recently th{
            background: blue;
            color: white;
            padding: 10px;

        }

        .recently td{
            padding: 5px;
            background: white;
        }

        .head{
            background-color: darkblue;
            color: white;
            margin-top: 20px;
        }

        .head input{
            padding: 10px;
            width: 100%;
            border-radius: 5px;
        }
    </style>
</head>
<body>
    <aside>
        <div class="logos">
            <div class="circle">
                P
            </div>
            STAFF
        </div>

        <div class="buttons">
            <a href="generate.html" ><i class="bi bi-qr-code"></i>  Generator</a>
            <a href="history.html" class="active"><i class="bi bi-stopwatch"> </i> history</a>
            <a href="search.html"><i class="bi bi-search"> </i>Search</a>
            <a href="profile.html"><i class="bi bi-people"> </i>Profile</a>
        </div>

        <div class="logout">
            <button>Logout</button>
        </div>
    </aside>

    <div class="right">
         <div class="header">
            <h1>History</h1>
        </div>
            <div class="containers">

            <div class="con">
                <h2><i class="bi bi-qr-code"></i> Generate QR</h2>
                <p>0</p>
            </div>

            <div class="con" style="color: pink;">
                <h2><i class="bi bi-qr-code"></i> Reject QR</h2>
                <p>0</p>
            </div>

            <div class="con" style="color:yellow;">
                <h2><i class="bi bi-qr-code"></i> Expired QR</h2>
                <p>0</p>
            </div>

            <div class="con" style="color: aquamarine;">
                <h2><i class="bi bi-qr-code"></i> Active QR</h2>
                <p>0</p>
            </div>

        </div>

        <div class="recently">
            <div>
                <h2>Recently Created</h2>
            </div>
            <table>
                <tr>
                    <th>#</th>
                    <th>img</th>
                    <th>data</th>
                    <th>Status</th>
                    <th>Action</th>
                    <th>Created at</th>
                </tr>

                <tr>
                    <td>shshsh</td>
                    <td>shshsh</td>
                    <td>shshsh</td>
                    <td>shshsh</td>
                    <td>shshsh</td>
                    <td>shshsh</td>
                </tr>

            </table>

            <div class="head">
                    <h2>All QR</h2>
                    <input type="text" placeholder="Search">
                </div>

            <table>
                
                <tr>
                    <th>#</th>
                    <th>data</th>
                    <th>Plate</th>
                    <th>status</th>
                    <th>Created By</th>
                    <th>Action</th>
                </tr>
            </table>
        </div>
    </div>


    
        

    
    
</body>
</html>
