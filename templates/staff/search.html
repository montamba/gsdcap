<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/../../static/css/staff.css">
    <link rel="stylesheet" href="/../../static/css/message.css">
    <script src="/../../static/scripts/scrit.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <title>Search — GSD Parking</title>

    <style>
        .header {
            background: #ffffff;
            border-bottom: 1px solid #c7d9f5;
            padding: 22px 32px;
            box-shadow: 0 1px 8px rgba(37,99,235,0.06);
        }
        .header h1 {
            font-size: 20px;
            font-weight: 800;
            color: #0f172a;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .header h1 i { color: #2563eb; }
        .header p {
            font-size: 11px;
            color: #94a3b8;
            font-family: 'Space Mono', monospace;
            margin-top: 3px;
            letter-spacing: 0.08em;
            text-transform: uppercase;
        }

        .inner { padding: 28px 32px; }

        /* ─── SEARCH BAR ─── */
        .search-box {
            background: #ffffff;
            border: 1px solid #c7d9f5;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 1px 6px rgba(37,99,235,0.07);
            margin-bottom: 24px;
        }

        .search-head {
            padding: 14px 20px;
            background: #f5f9ff;
            border-bottom: 1px solid #ddeaff;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .search-head::before {
            content: '';
            width: 3px;
            height: 14px;
            background: #2563eb;
            border-radius: 2px;
            flex-shrink: 0;
        }

        .search-head h2 {
            font-size: 12px;
            font-weight: 700;
            color: #64748b;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            font-family: 'Space Mono', monospace;
        }

        .search-head i { color: #2563eb; }

        .search-body {
            padding: 20px;
            display: flex;
            gap: 10px;
            align-items: center;
            flex-wrap: wrap;
        }

        .search-body input {
            flex: 1;
            min-width: 220px;
            padding: 12px 16px;
            background: #f8faff;
            border: 1.5px solid #c7d9f5;
            color: #0f172a;
            font-family: 'Syne', sans-serif;
            font-size: 14px;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
            border-radius: 8px;
        }

        .search-body input:focus {
            border-color: #2563eb;
            box-shadow: 0 0 0 3px rgba(37,99,235,0.1);
            background: #ffffff;
        }

        .search-body input::placeholder { color: #cbd5e1; }

        .filter-select {
            padding: 12px 14px;
            background: #f8faff;
            border: 1.5px solid #c7d9f5;
            color: #334155;
            font-family: 'Syne', sans-serif;
            font-size: 14px;
            outline: none;
            cursor: pointer;
            transition: border-color 0.2s;
            border-radius: 8px;
        }

        .filter-select:focus { border-color: #2563eb; }
        .filter-select option { background: #ffffff; }

        .btn-search {
            padding: 12px 22px;
            background: linear-gradient(135deg, #2563eb, #0ea5e9);
            border: none;
            color: #ffffff;
            font-family: 'Syne', sans-serif;
            font-size: 14px;
            font-weight: 800;
            cursor: pointer;
            border-radius: 8px;
            letter-spacing: 0.04em;
            display: flex;
            align-items: center;
            gap: 7px;
            transition: all 0.2s;
            box-shadow: 0 3px 10px rgba(37,99,235,0.25);
        }

        .btn-search:hover {
            opacity: 0.92;
            box-shadow: 0 5px 16px rgba(37,99,235,0.35);
            transform: translateY(-1px);
        }

        .btn-clear {
            padding: 12px 18px;
            background: #ffffff;
            border: 1.5px solid #c7d9f5;
            color: #64748b;
            font-family: 'Syne', sans-serif;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            border-radius: 8px;
            display: flex;
            align-items: center;
            gap: 7px;
            transition: all 0.2s;
        }

        .btn-clear:hover {
            border-color: #93c5fd;
            color: #2563eb;
            background: #eff6ff;
        }

        /* ─── RESULTS INFO ─── */
        .results-meta {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 12px;
            flex-wrap: wrap;
            gap: 8px;
        }

        .results-count {
            font-size: 12px;
            font-weight: 700;
            color: #64748b;
            font-family: 'Space Mono', monospace;
            letter-spacing: 0.06em;
        }

        .results-count span { color: #2563eb; }

        /* ─── TABLE ─── */
        .table-box {
            background: #ffffff;
            border: 1px solid #c7d9f5;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 1px 6px rgba(37,99,235,0.07);
        }

        .table-head-bar {
            padding: 14px 20px;
            background: #f5f9ff;
            border-bottom: 1px solid #ddeaff;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .table-head-bar::before {
            content: '';
            width: 3px;
            height: 14px;
            background: #2563eb;
            border-radius: 2px;
            flex-shrink: 0;
        }

        .table-head-bar h2 {
            font-size: 12px;
            font-weight: 700;
            color: #64748b;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            font-family: 'Space Mono', monospace;
        }

        .table-head-bar i { color: #2563eb; }

        table { width: 100%; border-collapse: collapse; }
        table tr { display: grid; grid-template-columns: 50px 1fr 140px 110px 130px 120px; }
        th, td { padding: 13px 16px; text-align: left; font-size: 12px; }
        th {
            background: #f5f9ff;
            color: #64748b;
            font-family: 'Space Mono', monospace;
            font-size: 10px;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            border-bottom: 1px solid #ddeaff;
        }
        td { color: #334155; border-bottom: 1px solid #f1f5f9; }
        tbody tr:last-child td { border-bottom: none; }
        tbody tr:hover td { background: #f8faff; }

        .badge {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 3px 10px;
            font-size: 10px;
            font-weight: 700;
            font-family: 'Space Mono', monospace;
            letter-spacing: 0.06em;
            border-radius: 20px;
        }
        .badge-active  { background: #d1fae5; color: #065f46; border: 1px solid #6ee7b7; }
        .badge-expired { background: #fef3c7; color: #92400e; border: 1px solid #fde68a; }
        .badge-revoked { background: #fee2e2; color: #991b1b; border: 1px solid #fca5a5; }

        .plate-text {
            font-family: 'Space Mono', monospace;
            color: #1e3a8a;
            font-size: 12px;
            font-weight: 700;
            letter-spacing: 0.04em;
        }

        /* ─── EMPTY / LOADING STATES ─── */
        .state-row td {
            padding: 48px 16px;
            text-align: center;
            color: #94a3b8;
            font-family: 'Space Mono', monospace;
            font-size: 11px;
            letter-spacing: 0.1em;
            grid-column: 1 / -1;
        }

        .state-row { display: block !important; }
        .state-row td { display: block; }

        .state-icon {
            font-size: 32px;
            display: block;
            margin-bottom: 10px;
            opacity: 0.4;
        }

        /* ─── SPINNER ─── */
        .spinner {
            width: 20px;
            height: 20px;
            border: 2px solid #dbeafe;
            border-top-color: #2563eb;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
            display: inline-block;
        }

        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <aside>
        <div class="logos">
            <div class="circle">P</div>
            <span>STAFF PORTAL</span>
        </div>
        <div class="buttons">
            <a href="/staff/generate"><i class="bi bi-qr-code"></i> Generator</a>
            <a href="/staff/history"><i class="bi bi-stopwatch"></i> History</a>
            <a href="/staff/search" class="active"><i class="bi bi-search"></i> Search</a>
            <a href="/staff/profile"><i class="bi bi-people"></i> Profile</a>
        </div>
        <div class="logout">
            <button onclick="window.location.href='/auth/logout'"><i class="bi bi-box-arrow-left"></i> Logout</button>
        </div>
    </aside>

    <div class="right">
        <div class="header">
            <h1><i class="bi bi-search"></i> Search QR Codes</h1>
            <p>LOOK UP QR CODES BY DATA, PLATE, OR STATUS</p>
        </div>

        <div class="inner">
            <div class="search-box">
                <div class="search-head">
                    <i class="bi bi-funnel-fill"></i>
                    <h2>Search & Filter</h2>
                </div>
                <div class="search-body">
                    <input type="text" id="searchInput" placeholder="Search by name, data or plate number..." oninput="liveSearch()">
                    <select class="filter-select" id="statusFilter" onchange="liveSearch()">
                        <option value="">All Statuses</option>
                        <option value="active">Active</option>
                        <option value="expired">Expired</option>
                        <option value="revoked">Revoked</option>
                    </select>
                    <button class="btn-search" onclick="doSearch()"><i class="bi bi-search"></i> Search</button>
                    <button class="btn-clear" onclick="clearSearch()"><i class="bi bi-x-lg"></i> Clear</button>
                </div>
            </div>

            <div class="results-meta">
                <div class="results-count">Showing <span id="countDisplay">0</span> result(s)</div>
            </div>

            <div class="table-box">
                <div class="table-head-bar">
                    <i class="bi bi-table"></i>
                    <h2>QR Code Results</h2>
                </div>
                <table>
                    <thead>
                        <tr>
                            <th>#</th>
                            <th>Data</th>
                            <th>Plate</th>
                            <th>Status</th>
                            <th>Valid Until</th>
                            <th>Created At</th>
                        </tr>
                    </thead>
                    <tbody id="resultsBody">
                        <tr class="state-row">
                            <td>
                                <span class="state-icon">🔍</span>
                                TYPE TO SEARCH OR PRESS SEARCH
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        let allData = []

        async function loadAll() {
            let res = await API.get("/staff/my_qr")
            if (res && res.data) {
                allData = res.data
                renderRows(allData)
            }
        }

        function renderRows(data) {
            const tbody = document.getElementById("resultsBody")
            document.getElementById("countDisplay").textContent = data.length

            if (!data.length) {
                tbody.innerHTML = `
                    <tr class="state-row">
                        <td>
                            <span class="state-icon">📭</span>
                            NO RESULTS FOUND
                        </td>
                    </tr>`
                return
            }

            tbody.innerHTML = data.map((d, i) => {
                const status  = (d[5] || "active").toLowerCase()
                const badgeClass = status === "active"  ? "badge-active"
                                 : status === "expired" ? "badge-expired"
                                 : "badge-revoked"
                const plate   = d[2] ? `<span class="plate-text">${d[2]}</span>` : `<span style="color:#cbd5e1;">—</span>`
                const validUntil = d[4] || "—"
                const createdAt  = d[7] || "—"

                return `
                <tr>
                    <td style="color:#94a3b8;font-family:'Space Mono',monospace;">${i + 1}</td>
                    <td style="color:#0f172a;font-weight:600;">${d[1] || "—"}</td>
                    <td>${plate}</td>
                    <td><span class="badge ${badgeClass}">${status}</span></td>
                    <td style="font-family:'Space Mono',monospace;font-size:11px;color:#64748b;">${validUntil}</td>
                    <td style="font-family:'Space Mono',monospace;font-size:11px;color:#64748b;">${createdAt}</td>
                </tr>`
            }).join("")
        }

        function liveSearch() {
            const q      = document.getElementById("searchInput").value.toLowerCase().trim()
            const status = document.getElementById("statusFilter").value.toLowerCase()

            const filtered = allData.filter(d => {
                const matchesText = !q ||
                    (d[1] && d[1].toLowerCase().includes(q)) ||
                    (d[2] && d[2].toLowerCase().includes(q))
                const matchesStatus = !status || (d[5] && d[5].toLowerCase() === status)
                return matchesText && matchesStatus
            })

            renderRows(filtered)
        }

        function doSearch() { liveSearch() }

        function clearSearch() {
            document.getElementById("searchInput").value = ""
            document.getElementById("statusFilter").value = ""
            renderRows(allData)
        }

        loadAll()
    </script>
</body>
</html>
