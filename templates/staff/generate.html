<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/../../static/css/staff.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <title>Generator</title>

    <style>
        .header{
            background: linear-gradient(136deg, lightblue, blue);
            padding: 10px;
        }

        .container{
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 30px;
            padding: 20px;
            
        }

        .con{
            background: lightblue;
            display: grid;
            grid-row-gap: 10px;
            width: 350px;
            padding: 20px;
        }

        .con > div{
            padding: 20px;
            border-bottom: 2px solid black;
        }

        .con h2{
            color: darkblue;
        }

        .con input{
            padding: 10px;
            border: 2px solid blue;
            border-radius: 10px;
        }

        .butt{
            display: grid;
        }

        .butt button{
            padding: 10px;
        }

        .view{
            width: 350px;
            border: 1px solid;
            padding: 20px;
            display: grid;
            place-items: center;
            grid-gap: 5px;
            background: lightblue;
        }

        .view h2{
            border-bottom: 2px solid;
            width: 80%;
            color: darkblue;
            
        }

        .view > div{
            width: 200px;
            height: 200px;
            border: 2px solid;
        }

        .view > div img{
            width: 100%;
            height: 100%;
        }

        .ta{
            background-color: beige;
            display: grid;
            place-items: center;
            padding: 20px;
        }

        .ta table{
            background: darkblue;
            width: 900px;
            color: aliceblue;
            height: 300px;
        }

        .ta tr{
            width: 100%;
            display: grid;
            grid-template-columns: 50px 1fr 100px 100px;
            grid-column-gap: 1px;
        }

        .ta th{
            padding: 10px;
            background: blue;

        }

        
    </style>
</head>
<body>
    <aside>
        <div class="logos">
            <div class="circle">
                P
            </div>
            STAFF
        </div>

        <div class="buttons">
            <a href="generate.html" class="active"><i class="bi bi-qr-code"></i>  Generator</a>
            <a href="history.html"><i class="bi bi-stopwatch"> </i> history</a>
            <a href="search.html"><i class="bi bi-search"> </i>Search</a>
            <a href="profile.html"><i class="bi bi-people"> </i>Profile</a>
        </div>

        <div class="logout">
            <button>Logout</button>
        </div>
    </aside>

    <div class="right">

        <div class="header">
            <h1>Genrate QR</h1>
            <p>generate your own qr</p>
        </div>


        <div class="container">
            <div class="con">
                <div>
                    <h2><i class="bi bi-qr-code"></i> Generate QR</h2>
                </div>
                <input type="text" id="text" placeholder="Enter text" >
                <input type="text" id="plate" placeholder="Enter Plate(Optional)" >

                <div>
                    <label for="">Valid until</label>
                    <input type="date" name="" id="">
                </div>

                <div class="butt">
                    <button onclick="generateQR()">Generate</button>
                    <button onclick="">Done</button>

                </div>
                
            </div>

            <div class="view">
                <h2>QR here</h2>
                <div id="qrcode"></div>

            </div>
        </div>

        <div class="ta">
            <table>
                <tr>
                    <th>#</th>
                    <th>Data</th>
                    <th>Plate</th>
                    <th>created at</th>
                </tr>
                
            </table>
        </div>






    </div>
        

    <script>
        function generateQR() {
            const text = document.getElementById("text").value;
            const plate = document.getElementById("plate").value;

            document.getElementById("qrcode").innerHTML = "";

            new QRCode(document.getElementById("qrcode"), {
                text: text,
                width: 200,
                height: 200
            });
        }
    </script>
    
</body>
</html>
