<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>QR Scanner — GSD Parking</title>
    <script src="/../../static/scripts/scrit.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * { padding: 0; margin: 0; box-sizing: border-box; font-family: 'Syne', sans-serif; }

        body {
            background: #eef4ff;
            color: #0f172a;
            min-height: 100vh;
            display: flex;
        }

        /* ─── SIDEBAR ─── */
        aside {
            position: sticky;
            top: 0; left: 0;
            height: 100vh;
            width: 240px;
            min-width: 240px;
            background: #1e3a8a;
            display: flex;
            flex-direction: column;
            z-index: 100;
            box-shadow: 4px 0 32px rgba(30,58,138,0.18);
        }

        .logos {
            padding: 26px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            background: #172e72;
            border-bottom: 1px solid rgba(255,255,255,0.08);
            text-align: center;
        }

        .circle {
            width: 60px; height: 60px;
            display: grid; place-items: center;
            border-radius: 16px;
            background: rgba(255,255,255,0.12);
            border: 2px solid rgba(255,255,255,0.2);
            font-size: 20px; font-weight: 800;
            color: #ffffff;
            font-family: 'Space Mono', monospace;
        }

        .logos span {
            font-size: 10px; font-weight: 700;
            color: rgba(148,163,184,0.7);
            letter-spacing: 0.2em;
            text-transform: uppercase;
        }

        .buttons { display: flex; flex-direction: column; padding: 14px 0; flex: 1; }

        .buttons a {
            text-decoration: none;
            color: rgba(186,210,255,0.75);
            font-size: 14px; font-weight: 600;
            padding: 11px 20px;
            display: flex; align-items: center; gap: 10px;
            border-left: 3px solid transparent;
            transition: all 0.2s;
        }
        .buttons a:hover { background: rgba(255,255,255,0.07); color: #ffffff; border-left-color: rgba(255,255,255,0.3); }
        .buttons a.active { background: rgba(255,255,255,0.12); color: #ffffff; border-left-color: #60a5fa; }

        .logout { padding: 16px; border-top: 1px solid rgba(255,255,255,0.08); }
        .logout button {
            width: 100%; padding: 10px;
            background: rgba(239,68,68,0.12);
            border: 1px solid rgba(239,68,68,0.3);
            color: #fca5a5;
            font-family: 'Syne', sans-serif;
            font-size: 13px; font-weight: 600;
            cursor: pointer; transition: all 0.2s; border-radius: 6px;
        }
        .logout button:hover { background: rgba(239,68,68,0.22); color: #ffffff; }

        /* ─── MAIN ─── */
        .right { flex: 1; overflow-x: hidden; min-width: 0; }

        .header {
            background: #ffffff;
            border-bottom: 1px solid #c7d9f5;
            padding: 22px 32px;
            box-shadow: 0 1px 8px rgba(37,99,235,0.06);
        }
        .header h1 { font-size: 20px; font-weight: 800; color: #0f172a; display: flex; align-items: center; gap: 8px; }
        .header h1 i { color: #2563eb; }
        .header p { font-size: 11px; color: #94a3b8; font-family: 'Space Mono', monospace; margin-top: 3px; letter-spacing: 0.08em; text-transform: uppercase; }

        .scanner-wrap {
            padding: 32px;
            display: flex;
            gap: 24px;
            align-items: flex-start;
            flex-wrap: wrap;
        }

        /* ─── ACTION SELECTOR ─── */
        .action-selector {
            background: #ffffff;
            border: 1px solid #c7d9f5;
            border-radius: 14px;
            overflow: hidden;
            box-shadow: 0 1px 6px rgba(37,99,235,0.07);
            margin-bottom: 20px;
            width: 100%;
        }
        .action-head {
            padding: 14px 20px;
            background: #f5f9ff;
            border-bottom: 1px solid #ddeaff;
            display: flex; align-items: center; gap: 8px;
        }
        .action-head::before { content: ''; width: 3px; height: 14px; background: #2563eb; border-radius: 2px; flex-shrink: 0; }
        .action-head h2 { font-size: 12px; font-weight: 700; color: #64748b; text-transform: uppercase; letter-spacing: 0.1em; font-family: 'Space Mono', monospace; }
        .action-head i { color: #2563eb; }

        .action-buttons { padding: 20px; display: flex; gap: 12px; }

        .action-btn {
            flex: 1; padding: 16px;
            border: 2px solid #ddeaff;
            background: #f8faff;
            color: #64748b;
            font-family: 'Syne', sans-serif;
            font-size: 14px; font-weight: 700;
            cursor: pointer; border-radius: 10px;
            transition: all 0.2s;
            display: flex; align-items: center; justify-content: center; gap: 10px;
            letter-spacing: 0.04em;
        }
        .action-btn:hover { border-color: #c7d9f5; background: #ffffff; }
        .action-btn.entry-active {
            background: linear-gradient(135deg, #2563eb, #0ea5e9);
            border-color: #2563eb;
            color: #ffffff;
            box-shadow: 0 4px 12px rgba(37,99,235,0.3);
        }
        .action-btn.exit-active {
            background: linear-gradient(135deg, #ef4444, #f97316);
            border-color: #ef4444;
            color: #ffffff;
            box-shadow: 0 4px 12px rgba(239,68,68,0.3);
        }

        /* ─── VIDEO CARD ─── */
        .video-card {
            background: #ffffff;
            border: 1px solid #c7d9f5;
            border-radius: 14px;
            overflow: hidden;
            box-shadow: 0 1px 6px rgba(37,99,235,0.07);
            flex-shrink: 0;
        }
        .card-head {
            padding: 14px 20px;
            background: #f5f9ff;
            border-bottom: 1px solid #ddeaff;
            display: flex; align-items: center; gap: 8px;
        }
        .card-head::before { content: ''; width: 3px; height: 14px; background: #2563eb; border-radius: 2px; flex-shrink: 0; }
        .card-head h2 { font-size: 12px; font-weight: 700; color: #64748b; text-transform: uppercase; letter-spacing: 0.1em; font-family: 'Space Mono', monospace; }
        .card-head i { color: #2563eb; }

        .video-body { padding: 20px; display: flex; flex-direction: column; align-items: center; gap: 16px; }

        .video-frame {
            position: relative;
            border-radius: 10px;
            overflow: hidden;
            border: 2px solid #ddeaff;
            background: #0f172a;
            width: 100%;
            max-width: 380px;
        }
        .video-frame::before, .video-frame::after { content: ''; position: absolute; width: 24px; height: 24px; z-index: 2; pointer-events: none; }
        .video-frame::before { top: 10px; left: 10px; border-top: 3px solid #2563eb; border-left: 3px solid #2563eb; border-radius: 2px 0 0 0; }
        .video-frame::after  { bottom: 10px; right: 10px; border-bottom: 3px solid #2563eb; border-right: 3px solid #2563eb; border-radius: 0 0 2px 0; }

        #reader { width: 340px; }

        .scan-line {
            position: absolute; left: 0; right: 0;
            height: 2px;
            background: linear-gradient(90deg, transparent, #2563eb, transparent);
            animation: scanMove 2s ease-in-out infinite;
            z-index: 3; pointer-events: none;
        }
        @keyframes scanMove { 0%{top:10%;opacity:0} 10%{opacity:1} 90%{opacity:1} 100%{top:90%;opacity:0} }

        /* scanning pulse ring */
        .scan-pulse {
            display: none;
            position: absolute;
            inset: 0; z-index: 4; pointer-events: none;
            border-radius: 8px;
            box-shadow: inset 0 0 0 3px #2563eb;
            animation: pulseBorder 0.8s ease-in-out infinite alternate;
        }
        .scanning .scan-pulse { display: block; }
        @keyframes pulseBorder {
            from { box-shadow: inset 0 0 0 3px #2563eb; }
            to   { box-shadow: inset 0 0 0 3px #0ea5e9, inset 0 0 20px rgba(37,99,235,0.3); }
        }

        .btn-capture {
            padding: 12px 28px;
            background: linear-gradient(135deg, #2563eb, #0ea5e9);
            border: none; color: #ffffff;
            font-family: 'Syne', sans-serif;
            font-size: 14px; font-weight: 800;
            cursor: pointer; border-radius: 8px;
            letter-spacing: 0.04em;
            display: flex; align-items: center; gap: 8px;
            transition: all 0.2s;
            box-shadow: 0 3px 12px rgba(37,99,235,0.28);
            width: 100%;
            justify-content: center;
        }
        .btn-capture:hover { opacity: 0.92; box-shadow: 0 5px 18px rgba(37,99,235,0.38); transform: translateY(-1px); }
        .btn-capture:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
        .btn-capture.scanning-state {
            background: linear-gradient(135deg, #f59e0b, #f97316);
            box-shadow: 0 3px 12px rgba(245,158,11,0.35);
        }

        /* ─── RESULT CARD ─── */
        .result-card {
            background: #ffffff;
            border: 1px solid #c7d9f5;
            border-radius: 14px;
            overflow: hidden;
            box-shadow: 0 1px 6px rgba(37,99,235,0.07);
            flex: 1; min-width: 280px;
        }
        .result-body { padding: 24px; display: flex; flex-direction: column; gap: 16px; }

        .result-banner {
            width: 100%;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
            border: 2px solid #ddeaff;
            background: #f5f9ff;
            transition: all 0.3s;
        }
        .result-banner .banner-icon  { font-size: 40px; margin-bottom: 8px; }
        .result-banner .banner-title { font-size: 16px; font-weight: 800; letter-spacing: 0.06em; font-family: 'Space Mono', monospace; }
        .result-banner .banner-msg   { font-size: 12px; color: #64748b; margin-top: 4px; }

        .result-banner.idle    { background: #f5f9ff;  border-color: #ddeaff; }
        .result-banner.success { background: #f0fdf4;  border-color: #6ee7b7; }
        .result-banner.fail    { background: #fef2f2;  border-color: #fca5a5; }
        .result-banner.expired { background: #fffbeb;  border-color: #fde68a; }
        .result-banner.scanning { background: #eff6ff; border-color: #93c5fd; animation: scanPulse 1s ease-in-out infinite alternate; }
        @keyframes scanPulse {
            from { border-color: #93c5fd; }
            to   { border-color: #2563eb; box-shadow: 0 0 16px rgba(37,99,235,0.15); }
        }

        .result-banner.success .banner-title { color: #065f46; }
        .result-banner.fail    .banner-title { color: #991b1b; }
        .result-banner.expired .banner-title { color: #92400e; }
        .result-banner.idle    .banner-title { color: #64748b; }
        .result-banner.scanning .banner-title { color: #2563eb; }

        .info-rows { display: flex; flex-direction: column; gap: 8px; }
        .info-row {
            display: flex; align-items: center; gap: 12px;
            background: #f8faff; border: 1px solid #ddeaff;
            border-radius: 8px; padding: 10px 14px;
        }
        .info-row .lbl { font-size: 9px; font-weight: 700; color: #94a3b8; text-transform: uppercase; letter-spacing: 0.14em; font-family: 'Space Mono', monospace; min-width: 70px; }
        .info-row .val { font-size: 13px; font-weight: 600; color: #0f172a; font-family: 'Space Mono', monospace; }

        /* ─── MOBILE ─── */
        @media (max-width: 768px) {
            aside { display: none; }

            /* Mobile bottom nav */
            .mobile-nav {
                display: flex !important;
                position: fixed;
                bottom: 0; left: 0; right: 0;
                background: #1e3a8a;
                z-index: 200;
                border-top: 1px solid rgba(255,255,255,0.1);
                padding-bottom: env(safe-area-inset-bottom);
            }
            .mobile-nav a {
                flex: 1;
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
                gap: 4px;
                padding: 10px 4px;
                text-decoration: none;
                color: rgba(186,210,255,0.7);
                font-size: 9px;
                font-weight: 700;
                letter-spacing: 0.08em;
                text-transform: uppercase;
                transition: all 0.2s;
            }
            .mobile-nav a i { font-size: 20px; }
            .mobile-nav a.active,
            .mobile-nav a:hover { color: #fff; background: rgba(255,255,255,0.1); }

            .header { padding: 16px 18px; }
            .header h1 { font-size: 17px; }

            /* Stack scanner vertically and fill the screen */
            .scanner-wrap {
                padding: 16px 16px 90px; /* extra bottom for mobile nav */
                flex-direction: column;
                gap: 16px;
            }

            .video-card, .result-card, .action-selector { width: 100%; }

            /* Make video fill width on mobile */
            #reader { width: 100%; }
            .video-frame { max-width: 100%; }

            .video-body { padding: 14px; }
            .action-buttons { padding: 14px; gap: 8px; }
            .action-btn { padding: 14px 10px; font-size: 13px; }

            .result-body { padding: 16px; }
            .result-banner { padding: 16px; }
            .result-banner .banner-icon { font-size: 32px; }
            .result-banner .banner-title { font-size: 14px; }
        }

        @media (max-width: 480px) {
            .action-btn { gap: 6px; }
            .action-btn i { font-size: 18px; }
        }
    </style>
</head>
<body>
    <!-- Desktop sidebar -->
    <aside>
        <div class="logos">
            <div class="circle">G</div>
            <span>GUARD PORTAL</span>
        </div>
        <div class="buttons">
            <a href="/guard/scan" class="active"><i class="bi bi-qr-code-scan"></i> Scanner</a>
            <a href="/guard/history"><i class="bi bi-clock-history"></i> My History</a>
        </div>
        <div class="logout">
            <button onclick="window.location.href='/auth/logout'"><i class="bi bi-box-arrow-left"></i> Logout</button>
        </div>
    </aside>

    <!-- Mobile bottom nav -->
    <nav class="mobile-nav" style="display:none;">
        <a href="/guard/scan" class="active"><i class="bi bi-qr-code-scan"></i> Scanner</a>
        <a href="/guard/history"><i class="bi bi-clock-history"></i> History</a>
        <a href="/auth/logout"><i class="bi bi-box-arrow-left"></i> Logout</a>
    </nav>

    <div class="right">
        <div class="header">
            <div>
                <h1><i class="bi bi-qr-code-scan"></i> QR Scanner</h1>
                <p>SCAN VEHICLE QR CODES FOR ENTRY / EXIT</p>
            </div>
        </div>

        <!-- Action Selector -->
        <div style="padding: 28px 32px 0;">
            <div class="action-selector">
                <div class="action-head">
                    <i class="bi bi-arrow-left-right"></i>
                    <h2>Select Action</h2>
                </div>
                <div class="action-buttons">
                    <button class="action-btn entry-active" id="entryBtn" onclick="setAction('entry')">
                        <i class="bi bi-arrow-bar-right"></i> ENTRY
                    </button>
                    <button class="action-btn" id="exitBtn" onclick="setAction('exit')">
                        <i class="bi bi-arrow-bar-left"></i> EXIT
                    </button>
                </div>
            </div>
        </div>

        <div class="scanner-wrap">
            <!-- Camera -->
            <div class="video-card">
                <div class="card-head">
                    <i class="bi bi-camera-video-fill"></i>
                    <h2>Live Camera</h2>
                </div>
                <div class="video-body">
                    <div class="video-frame" id="videoFrame">
                        <div id="reader"></div>
                        <div class="scan-line"></div>
                        <div class="scan-pulse"></div>
                    </div>
                    <button class="btn-capture" id="captureBtn" onclick="toggleScan()">
                        <i class="bi bi-camera" id="captureIcon"></i>
                        <span id="captureText">Capture &amp; Scan</span>
                    </button>
                </div>
            </div>

            <!-- Result -->
            <div class="result-card">
                <div class="card-head">
                    <i class="bi bi-clipboard-check"></i>
                    <h2>Scan Result</h2>
                </div>
                <div class="result-body">
                    <div class="result-banner idle" id="resultBanner">
                        <div class="banner-icon">📷</div>
                        <div class="banner-title">WAITING FOR SCAN</div>
                        <div class="banner-msg">Press Capture &amp; Scan to begin</div>
                    </div>

                    <div class="info-rows" id="infoRows" style="display:none;">
                        <div class="info-row"><span class="lbl">Owner</span><span class="val" id="rOwner">—</span></div>
                        <div class="info-row"><span class="lbl">Plate</span><span class="val" id="rPlate">—</span></div>
                        <div class="info-row"><span class="lbl">Valid Until</span><span class="val" id="rExpiry">—</span></div>
                        <div class="info-row"><span class="lbl">Action</span><span class="val" id="rAction">—</span></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/html5-qrcode"></script>
    <script>
        let scanning        = false;
        let currentAction   = "entry";
        let processingLock  = false;   // prevents double-processing

        function setAction(action) {
            currentAction = action;
            document.getElementById("entryBtn").className = "action-btn" + (action === "entry" ? " entry-active" : "");
            document.getElementById("exitBtn").className  = "action-btn" + (action === "exit"  ? " exit-active"  : "");
        }

        const html5QrCode = new Html5Qrcode("reader");
        const cameraConfig = window.innerWidth < 600
            ? { facingMode: "environment" }   // rear camera on mobile
            : { facingMode: "user" };

        html5QrCode.start(
            cameraConfig,
            { fps: 10, qrbox: { width: 250, height: 250 } },
            async (decodedText) => {
                if (!scanning || processingLock) return;
                processingLock = true;
                scanning       = false;

                const captureBtn = document.getElementById("captureBtn");
                captureBtn.disabled = true;
                captureBtn.innerHTML = '<i class="bi bi-hourglass-split"></i> Checking…';
                captureBtn.classList.add("scanning-state");
                document.getElementById("videoFrame").classList.remove("scanning");

                setBanner("scanning", "🔍", "PROCESSING…", "Verifying QR code…");

                await checkData(decodedText);

                captureBtn.disabled = false;
                captureBtn.innerHTML = '<i class="bi bi-camera" id="captureIcon"></i><span id="captureText">Capture &amp; Scan</span>';
                captureBtn.classList.remove("scanning-state");
                processingLock = false;
            },
            () => {}
        ).catch(err => console.error("Camera error:", err));

        function toggleScan() {
            if (processingLock) return;

            if (scanning) {
                scanning = false;
                document.getElementById("videoFrame").classList.remove("scanning");
                document.getElementById("captureBtn").innerHTML =
                    '<i class="bi bi-camera"></i> Capture &amp; Scan';
                document.getElementById("captureBtn").classList.remove("scanning-state");
                setBanner("idle", "📷", "WAITING FOR SCAN", "Press Capture & Scan to begin");
            } else {
                scanning = true;
                document.getElementById("videoFrame").classList.add("scanning");
                document.getElementById("captureBtn").innerHTML =
                    '<i class="bi bi-x-circle"></i> Cancel Scan';
                document.getElementById("captureBtn").classList.add("scanning-state");
                setBanner("scanning", "🔍", "SCANNING…", "Hold the QR code steady in front of the camera");
            }
        }

        async function checkData(qrData) {
            try {
                const res = await API.post("/guard/check_qr", {
                    data:   qrData,
                    action: currentAction
                });

                const result = res.scan_result || (res.status === "good" ? "accepted" : "failed");

                if (result === "accepted") {
                    setBanner("success", "✅", "ACCESS GRANTED", res.message);
                } else if (result === "expired") {
                    setBanner("expired", "⏰", "QR EXPIRED", res.message);
                } else {
                    setBanner("fail", "❌", "ACCESS DENIED", res.message);
                }

                document.getElementById("infoRows").style.display = "flex";
                document.getElementById("rOwner").textContent  = res.owner_name  || "—";
                document.getElementById("rPlate").textContent  = res.plate       || "—";
                document.getElementById("rExpiry").textContent = res.valid_until  || "—";
                document.getElementById("rAction").textContent = currentAction.toUpperCase();

            } catch (e) {
                setBanner("fail", "❌", "ERROR", "Could not reach server");
                console.error(e);
            }
        }

        function setBanner(type, icon, title, msg) {
            const banner = document.getElementById("resultBanner");
            banner.className = "result-banner " + type;
            banner.querySelector(".banner-icon").textContent  = icon;
            banner.querySelector(".banner-title").textContent = title;
            banner.querySelector(".banner-msg").textContent   = msg;
        }
    </script>
</body>
</html>
